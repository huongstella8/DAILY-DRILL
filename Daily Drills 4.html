<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Daily Drills 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--lc:#2D6A4F;--ll:#D8F3DC;--bg:#F4F2EF;--hdr:#111;--rad:10px;--shadow:0 2px 8px rgba(0,0,0,.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#1a1a1a;min-height:100vh}
code,pre,.mono{font-family:'JetBrains Mono',monospace}

/* HEADER */
header{background:var(--hdr);color:#fff;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand{font-size:.7rem;font-weight:700;letter-spacing:.18em;opacity:.6;text-transform:uppercase}
.hdr-title{font-size:1.1rem;font-weight:700;letter-spacing:.04em}
.hdr-sub{font-size:.75rem;opacity:.55;margin-top:2px}
.hdr-dl button{background:#fff;color:var(--hdr);border:none;padding:8px 18px;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.hdr-dl button:hover{opacity:.85}

/* LEVEL TABS */
.lv-tabs{display:flex;gap:0;border-bottom:2px solid #ddd;padding:0 32px;background:#fff;position:sticky;top:0;z-index:50;overflow-x:auto}
.lv-tab{padding:14px 22px;font-size:.82rem;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;color:#666}
.lv-tab.active{color:var(--lc);border-bottom-color:var(--lc)}
.lv-tab:hover:not(.active){color:#333}

/* LEVEL HERO */
.hero{padding:28px 32px 20px;border-bottom:1px solid #e4e1db}
.hero-row{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.hero-badge{background:var(--lc);color:#fff;padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.hero-info{flex:1;min-width:220px}
.hero-theme{font-size:1.25rem;font-weight:700;color:var(--lc);margin-bottom:4px}
.hero-tagline{font-size:.88rem;color:#555;margin-bottom:10px}
.hero-goal{font-size:.82rem;background:var(--ll);border-left:3px solid var(--lc);padding:10px 14px;border-radius:0 6px 6px 0;color:#333;line-height:1.6}
.hero-time{font-size:.75rem;color:#888;margin-top:8px;font-weight:500}

/* SECTION NAV */
.sec-nav{display:flex;gap:8px;padding:16px 32px;overflow-x:auto;border-bottom:1px solid #e4e1db;background:#fff}
.sec-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;color:#555}
.sec-btn.active{background:var(--lc);color:#fff;border-color:var(--lc)}
.sec-btn:hover:not(.active){border-color:var(--lc);color:var(--lc)}

/* MAIN CONTENT */
.content{padding:28px 32px;max-width:900px}

/* PROGRESS BAR */
.prog-wrap{background:#eee;border-radius:20px;height:8px;margin-bottom:24px;overflow:hidden}
.prog-bar{height:100%;border-radius:20px;background:var(--lc);transition:width .4s ease}
.prog-label{font-size:.75rem;color:#888;margin-bottom:6px;font-weight:500}

/* THEORY CARDS */
.theory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:4px}
.tc{background:#fff;border-radius:var(--rad);padding:16px 18px;border-top:4px solid var(--lc);box-shadow:var(--shadow)}
.tc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tc-label{font-weight:700;font-size:.92rem;color:var(--hdr)}
.tc-badge{background:var(--ll);color:var(--lc);font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.04em;text-transform:uppercase}
.tc-examples{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:#f8f8f6;padding:8px 10px;border-radius:6px;margin-bottom:8px;line-height:1.7;color:#333}
.tc-rule{font-size:.8rem;color:#555;line-height:1.6}

/* THEORY2 GROUPS */
.t2-group{background:#fff;border-radius:var(--rad);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:12px;border-left:4px solid var(--lc)}
.t2-label{font-weight:700;font-size:.95rem;margin-bottom:8px;color:var(--lc)}
.t2-verbs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.t2-verb{background:var(--ll);color:var(--lc);padding:3px 10px;border-radius:12px;font-size:.78rem;font-weight:600;font-family:'JetBrains Mono',monospace}
.t2-memory{font-size:.8rem;color:#444;background:#f5f3f0;padding:8px 12px;border-radius:6px;margin-bottom:8px;line-height:1.5;font-style:italic}
.t2-example{font-size:.82rem;color:#555;font-family:'JetBrains Mono',monospace;line-height:1.6}

/* THEORY3 */
.t3-pair{background:#fff;border-radius:var(--rad);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:12px}
.t3-spoken{font-size:.82rem;color:#888;text-decoration:line-through;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.t3-academic{font-size:.85rem;color:#1a1a1a;font-weight:600;margin-bottom:8px;font-family:'JetBrains Mono',monospace;line-height:1.5}
.t3-change{font-size:.78rem;color:var(--lc);background:var(--ll);padding:5px 10px;border-radius:6px}
.t3-insight{background:var(--hdr);color:#fff;border-radius:var(--rad);padding:14px 18px;font-size:.83rem;line-height:1.65;margin-top:4px}

/* THEORY4 */
.t4-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.t4-card{background:#fff;border-radius:var(--rad);padding:16px 18px;box-shadow:var(--shadow);border-top:4px solid var(--lc)}
.t4-label{font-weight:700;font-size:.9rem;margin-bottom:8px;color:var(--hdr)}
.t4-desc{font-size:.8rem;color:#555;line-height:1.6;margin-bottom:10px}
.t4-fix{font-size:.79rem;font-family:'JetBrains Mono',monospace;background:#f5f3f0;padding:8px 10px;border-radius:6px;color:#333;line-height:1.6}

/* SPOT */
.spot-item{background:#fff;border-radius:var(--rad);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:14px}
.spot-num{font-size:.72rem;font-weight:700;color:#999;letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase}
.spot-sentence{font-size:.95rem;line-height:1.7;margin-bottom:14px;color:#1a1a1a}
.spot-sentence u{text-decoration:underline;text-decoration-color:var(--lc);text-underline-offset:3px;font-weight:600}
.spot-choices{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.spot-choice{padding:8px 16px;border-radius:8px;border:2px solid #ddd;background:#fff;font-size:.83rem;cursor:pointer;font-weight:500;transition:all .15s}
.spot-choice:hover:not(.locked){border-color:var(--lc);color:var(--lc)}
.spot-choice.selected{border-color:var(--lc);background:var(--ll);color:var(--lc)}
.spot-choice.correct{border-color:#2D6A4F;background:#D8F3DC;color:#2D6A4F}
.spot-choice.wrong{border-color:#c0392b;background:#fde;color:#c0392b}
.spot-feedback{display:none;margin-top:10px;border-radius:8px;padding:12px 14px;font-size:.82rem;line-height:1.6}
.spot-feedback.show{display:block}
.spot-feedback.ok{background:#D8F3DC;border-left:3px solid #2D6A4F}
.spot-feedback.err{background:#fde8e8;border-left:3px solid #c0392b}
.fb-rule{margin-top:6px;color:#444}
.fb-tip{margin-top:6px;font-style:italic;color:#666;font-size:.79rem}
.spot-check-btn{margin-top:10px;padding:7px 18px;background:var(--lc);color:#fff;border:none;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.spot-check-btn:hover{opacity:.85}
.spot-check-btn:disabled{opacity:.5;cursor:default}
.spot-score{margin-top:14px;padding:10px 14px;background:#f5f3f0;border-radius:8px;font-size:.83rem;font-weight:600}

/* RUBRIC */
.rub-toggle{background:none;border:1px solid #ddd;border-radius:6px;padding:5px 12px;font-size:.75rem;cursor:pointer;color:#777;margin-bottom:10px;transition:all .15s}
.rub-toggle:hover{border-color:var(--lc);color:var(--lc)}
.rub-table{display:none;width:100%;border-collapse:collapse;font-size:.78rem;margin-bottom:12px}
.rub-table.show{display:table}
.rub-table th{background:var(--lc);color:#fff;padding:7px 10px;text-align:left}
.rub-table td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:top}
.rub-table tr:last-child td{border-bottom:none}
.rub-max{font-weight:700;color:var(--lc);text-align:center}

/* FILL */
.fill-item{background:#fff;border-radius:var(--rad);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:14px}
.fill-template{font-size:.95rem;line-height:1.7;margin-bottom:10px;color:#1a1a1a}
.fill-base{display:inline-block;background:var(--ll);color:var(--lc);padding:2px 10px;border-radius:10px;font-size:.78rem;font-weight:700;margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.fill-input-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fill-input{border:2px solid #ddd;border-radius:8px;padding:8px 14px;font-size:.88rem;font-family:'JetBrains Mono',monospace;outline:none;transition:border-color .15s;min-width:180px}
.fill-input:focus{border-color:var(--lc)}
.fill-input.correct{border-color:#2D6A4F;background:#D8F3DC}
.fill-input.wrong{border-color:#c0392b;background:#fde}
.fill-btn{padding:8px 16px;background:var(--lc);color:#fff;border:none;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.fill-btn:hover{opacity:.85}
.fill-btn:disabled{opacity:.5;cursor:default}
.fill-feedback{display:none;margin-top:10px;border-radius:8px;padding:10px 14px;font-size:.82rem;line-height:1.6}
.fill-feedback.show{display:block}
.fill-feedback.ok{background:#D8F3DC;border-left:3px solid #2D6A4F}
.fill-feedback.err{background:#fde8e8;border-left:3px solid #c0392b}

/* TRANSFORM */
.tr-item{background:#fff;border-radius:var(--rad);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:14px}
.tr-spoken{font-size:.88rem;color:#777;font-style:italic;margin-bottom:8px;padding:8px 12px;background:#f5f3f0;border-radius:6px;font-family:'JetBrains Mono',monospace;line-height:1.5}
.tr-hint{font-size:.78rem;color:var(--lc);background:var(--ll);padding:5px 10px;border-radius:6px;margin-bottom:10px;font-style:italic}
.tr-textarea{width:100%;border:2px solid #ddd;border-radius:8px;padding:10px 14px;font-size:.85rem;font-family:'JetBrains Mono',monospace;resize:vertical;min-height:80px;outline:none;transition:border-color .15s;line-height:1.6}
.tr-textarea:focus{border-color:var(--lc)}
.tr-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.tr-save-btn,.tr-reveal-btn{padding:7px 16px;border:none;border-radius:6px;font-size:.79rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.tr-save-btn{background:var(--lc);color:#fff}
.tr-reveal-btn{background:#f0f0f0;color:#555}
.tr-save-btn:hover,.tr-reveal-btn:hover{opacity:.8}
.tr-answer{display:none;margin-top:10px;background:#f5f3f0;border-radius:8px;padding:12px 14px;font-size:.82rem;line-height:1.65}
.tr-answer.show{display:block}
.tr-answer strong{color:var(--lc);display:block;margin-bottom:4px}
.tr-principle{font-size:.78rem;color:#666;font-style:italic;margin-top:6px;padding-top:6px;border-top:1px solid #ddd}

/* LOG */
.log-item{background:#fff;border-radius:var(--rad);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:14px}
.log-prompt{font-size:.87rem;color:#333;line-height:1.65;margin-bottom:10px;font-weight:500}
.log-textarea{width:100%;border:2px solid #ddd;border-radius:8px;padding:10px 14px;font-size:.85rem;font-family:'Inter',sans-serif;resize:vertical;min-height:80px;outline:none;transition:border-color .15s;line-height:1.6}
.log-textarea:focus{border-color:var(--lc)}
.log-save-btn{margin-top:8px;padding:7px 16px;background:var(--lc);color:#fff;border:none;border-radius:6px;font-size:.79rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.log-save-btn:hover{opacity:.85}
.log-saved{display:none;margin-top:6px;font-size:.75rem;color:#2D6A4F;font-weight:600}
.log-saved.show{display:block}
.log-all-btn{margin-top:4px;padding:8px 20px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.log-all-btn:hover{opacity:.8}

/* SCORE BADGE */
.score-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.75rem;font-weight:700}
.score-badge.good{background:#D8F3DC;color:#2D6A4F}
.score-badge.mid{background:#fff3cd;color:#856404}
.score-badge.low{background:#fde8e8;color:#c0392b}

/* SECTION TITLE */
.sec-title{font-size:1.1rem;font-weight:700;color:var(--hdr);margin-bottom:4px}
.sec-sub{font-size:.82rem;color:#888;margin-bottom:18px}

@media(max-width:600px){
  header{padding:14px 18px}
  .lv-tabs{padding:0 12px}
  .hero,.sec-nav,.content{padding-left:14px;padding-right:14px}
  .theory-grid,.t4-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div>
    <div class="brand">Huong Stella Paradigm</div>
    <div class="hdr-title">Day 4 &middot; Interactive Practice</div>
    <div class="hdr-sub">Tense Accuracy</div>
  </div>
  <div class="hdr-dl"><button onclick="handleDownload()">&#8615; Download Report</button></div>
</header>

<div class="lv-tabs" id="lvTabs"></div>

<div class="hero" id="hero"></div>
<div class="sec-nav" id="secNav"></div>
<div class="content" id="content"></div>

<script>

let AL='a2b1', AS=0;
const ST={choices:{}, inputs:{}, checked:{}, logs:{}};

// ── DATA ───────────────────────────────────────────────────────────────
const RUBRICS={
  a2b1:{
    spot:[
      {criterion:"Error identified",max:1,desc:"Correctly selects the underlined error"},

    fill:[

      {criterion:"Spelling & form",max:1,desc:"Third-person -s, -ing ending correct"},

    ]
  },
  b1b2:{
    spot:[
      {criterion:"Error identified",max:1,desc:"Selects the wrong tense form"},
      {criterion:"Correction accurate",max:2,desc:"Supplies the correct past simple or present perfect form"},
      {criterion:"Time signal noted",max:1,desc:"Identifies the time expression that determines the tense"}
    ],
    fill:[
      {criterion:"Correct tense chosen",max:2,desc:"Accurately selects past simple or present perfect"},
      {criterion:"Form accuracy",max:1,desc:"Irregular past participles spelled correctly"},
      {criterion:"Signal word matched",max:1,desc:"Tense choice matches the time expression given"}

    ]
  },
  b2c1:{
    spot:[
      {criterion:"Error identified",max:1,desc:"Locates the tense error in the academic sentence"},
      {criterion:"Correction accurate",max:2,desc:"Supplies the correct perfect aspect form"},
      {criterion:"Academic justification",max:1,desc:"Explains why perfect aspect is required in this context"}
    ],
    fill:[
      {criterion:"Perfect form correct",max:2,desc:"Has/have/had + past participle used accurately"},

    ],
    transform:[
      {criterion:"Tense upgraded",max:2,desc:"Converts simple past to perfect aspect where required"},
      {criterion:"Meaning preserved",max:1,desc:"Academic sentence retains the original proposition"},
      {criterion:"Register appropriate",max:1,desc:"Sentence reads as formal academic prose"}
    ],
    log:[

      {criterion:"Principle stated",max:2,desc:"Explains when perfect aspect signals academic relevance"},
      {criterion:"Revised sentence",max:2,desc:"Rewrites a sentence to use perfect aspect correctly"}
    ]
  },
  c1c2:{
    spot:[
      {criterion:"Error identified",max:1,desc:"Pinpoints tense inconsistency or sequencing error"},
      {criterion:"Correction accurate",max:2,desc:"Supplies the correct tense for the argument's logic"},
      {criterion:"Discourse justification",max:1,desc:"Explains how the error disrupts argument flow"}
    ],
    fill:[
      {criterion:"Correct tense sequence",max:2,desc:"Chooses the tense that maintains narrative/argument logic"},
      {criterion:"Verb form accuracy",max:1,desc:"Complex tense forms (perfect, conditional perfect) correct"},
      {criterion:"Rhetorical function",max:1,desc:"Tense choice serves the argumentative purpose"}
    ],
    transform:[
      {criterion:"Tense architecture",max:2,desc:"Constructs a coherent multi-tense sequence"},
      {criterion:"Logical precision",max:1,desc:"Tense choice makes causal/temporal logic explicit"},
      {criterion:"C2 register",max:1,desc:"Sentence demonstrates C2-level syntactic sophistication"}
    ],
    log:[
      {criterion:"Error pattern noted",max:2,desc:"Identifies a systemic tense sequencing problem in your writing"},
      {criterion:"Rhetorical impact analysed",max:2,desc:"Explains how tense choice affects argument persuasiveness"},
      {criterion:"Complex revision",max:2,desc:"Rewrites a multi-clause sentence with correct tense sequencing"}
    ]
  }
};

const LEVELS={
  a2b1:{
    label:"A2–B1",color:"#2D6A4F",light:"#D8F3DC",
    theme:"Present Simple vs Continuous",
    tagline:"Know when to use ‘-ing’ and when to use the base form.",
    goal:"Today you will: (1) identify state verbs that never use -ing, (2) spot present tense errors in realistic sentences, (3) choose the correct tense form for five sentences.",
    time:"10–15 min",
    sections:[
      {
        title:"Warm-up: Tense Cards",
        type:"theory",
        cards:[
          {label:"Present Simple",badge:"habit / fact",color:"#2D6A4F",
           examples:"She teaches English every day.\nWater boils at 100°C.\nI usually wake up at 7 a.m.",
           rule:"Use Present Simple for habits, routines, and permanent facts. Key signals: always, usually, often, sometimes, never, every day/week/year."},
          {label:"Present Continuous",badge:"right now / temporary",color:"#1A4A7A",
           examples:"She is teaching a class right now.\nI am staying with my cousin this week.\nLook — it is raining!",
           rule:"Use Present Continuous for actions happening at the moment of speaking, or for temporary situations. Key signals: now, at the moment, currently, today, this week/month."},
          {label:"State Verbs (never -ing!)",badge:"state",color:"#8B1A1A",
           examples:"✗ I am knowing the answer.\n✓ I know the answer.\n✗ She is wanting some water.\n✓ She wants some water.",
           rule:"State verbs describe conditions, not actions. They NEVER use -ing. Groups: mental (know, understand, believe, remember), emotional (love, hate, want, prefer), sense (see, hear), possession (have/own when meaning 'possess')."},
          {label:"Tricky Verbs (two meanings!)",badge:"watch out",color:"#5A1A8A",
           examples:"I think you are right. (opinion = state → simple)\nI am thinking about the problem. (active process → continuous)\nShe has a car. (own = state → simple)\nShe is having lunch. (eating = action → continuous)",
           rule:"Some verbs change meaning: think, have, see, taste, smell. Ask: is this a state/condition, or an active ongoing process? States use simple; ongoing actions use continuous."}
        ]
      },
      {
        title:"Spot the Error",type:"spot",rubricKey:"spot",
        items:[
          {sentence:"My father is knowing three languages fluently.",
           underlined:"is knowing",wrongWord:"is knowing",correctWord:"knows",
           wrongType:"state verb + -ing",correctType:"present simple",
           rule:"'Know' is a state verb expressing mental possession of knowledge. State verbs do not take the -ing form. Use present simple: 'My father knows three languages fluently.'",
           tip:"Ask: can you physically 'do' this? You can't 'do' knowing — it's a state, not an action. No -ing for mental states."},
          {sentence:"Look! The cat is sit on your laptop.",
           underlined:"is sit",wrongWord:"is sit",correctWord:"is sitting",
           wrongType:"missing -ing",correctType:"present continuous",
           rule:"Present continuous = is/am/are + verb-ing. 'Sit' needs the -ing ending in continuous form. 'Is sit' has the auxiliary but is missing the -ing.",
           tip:"Present continuous has TWO parts: auxiliary (is/am/are) + main verb-ing. If you see 'is/am/are', the next verb must end in -ing."},
          {sentence:"She usually is going to the market on Sunday mornings.",
           underlined:"is going",wrongWord:"is going",correctWord:"goes",
           wrongType:"continuous for habit",correctType:"present simple",
           rule:"'Usually' signals a habit or routine — present simple territory. Habitual frequency adverbs (always, usually, often, sometimes, never) do not pair with the continuous form.",
           tip:"Spot the frequency word first. 'Usually' = habit = present simple. Only switch to continuous when you see 'now / at the moment / currently'."},
          {sentence:"I am not understanding why he left without saying goodbye.",
           underlined:"am not understanding",wrongWord:"am not understanding",correctWord:"do not understand",
           wrongType:"state verb + -ing",correctType:"present simple negative",
           rule:"'Understand' is a state verb (mental process). It does not take continuous form. Use 'don't/doesn't understand' for negation.",
           tip:"Mental states — believe, know, understand, remember, forget — are nearly always simple. If you're tempted to add -ing to these, pause and ask: action or state?"},
          {sentence:"The children play in the garden at the moment.",

           wrongType:"simple for in-progress action",correctType:"present continuous",

           tip:"'At the moment', 'right now', 'currently', 'look!', 'listen!' are red-flag signals for present continuous. Spot them → switch to is/am/are + -ing."},
          {sentence:"Water consisting of hydrogen and oxygen atoms.",

           memory:"If you see a FINISHED time marker (yesterday, ago, in [year], last…), use past simple. If you see a RELEVANCE marker (just, already, yet, ever, since), use present perfect.",

           fix:"Choose tense intentionally: in your results section, 'the analysis reveals' asserts directly. In your discussion, 'these patterns may have reflected broader societal shifts' hedges the interpretation — leaving room for alternative readings."}

      },
      {

           answer:"Had the study been designed with greater methodological rigour, it would have yielded substantially different — and arguably more reliable — results.\n\nAlternatively: Had the researchers adopted a longitudinal rather than cross-sectional design, the findings would have demonstrated far greater ecological validity.",
           keyChange:"'Did differently' → inverted third conditional with past perfect; 'results would be different' → 'would have yielded' (conditional perfect); evaluative framing added; register elevated throughout",
           principle:"Counterfactual arguments use the inverted third conditional (Had + subject + past participle) for formality. Avoid 'If they had done' in favour of the inverted form in advanced academic writing."},
          {spoken:"Researchers have been studying this for years and they still don't have a clear answer.",
           hint:"Despite / sustained scholarly attention / spanning / no consensus has emerged / regarding",
           answer:"Despite sustained scholarly attention spanning several decades, no consensus has emerged regarding the precise mechanisms underlying this phenomenon.\n\nAlternatively: Although the question has attracted considerable empirical investigation over the past several years, the literature remains divided on its central explanatory claims.",
           keyChange:"'Have been studying' nominalised to 'scholarly attention spanning'; 'don't have a clear answer' → 'no consensus has emerged'; concessive structure ('despite/although') signals argumentative sophistication; present perfect preserved",
           principle:"Nominalisation (converting verb phrases into noun phrases) compresses information and elevates register. 'Despite + noun phrase' signals a sophisticated concessive move that acknowledges effort while asserting failure."},
          {spoken:"As I showed earlier, this idea doesn't work because the evidence contradicts it.",
           hint:"as has been demonstrated / the proposition / is undermined / the weight of evidence",
           answer:"As has been demonstrated in the preceding sections, this proposition is fundamentally undermined by the weight of empirical evidence.\n\nAlternatively: As the foregoing analysis has shown, the theoretical claim in question cannot be sustained in light of the contradictory empirical record.",
           keyChange:"First-person 'I showed' → impersonal 'has been demonstrated' (present perfect passive); 'this idea doesn't work' → 'proposition is fundamentally undermined'; 'as' clause uses present perfect for backward reference",
           principle:"Academic self-referencing avoids first person by using passive perfect constructions: 'as has been argued', 'as has been demonstrated'. This maintains objectivity and positions the argument as shared or established."}
        ]
      },
      {
        title:"Error Log",type:"log",rubricKey:"log",
        prompts:[
          "Identify a passage in your own writing where your tense sequencing is unclear or illogical. Quote it, mark the tense errors, and rewrite it with a corrected tense architecture. Explain each change you made.",
          "Analyse this question: why does switching from 'Smith argued' to 'Smith argues' change the rhetorical effect of your sentence? Address: (a) what each tense implies about the status of the argument, and (b) which you would choose in a literature review and why.",
          "Write a complex 3-sentence passage for an academic argument that includes: (1) a present perfect to describe the state of the field, (2) a past perfect to sequence an earlier event, and (3) an analytical present for your own interpretive claim. Label each tense choice."
        ]
      }
    ]
  }
};

// ── HELPERS ────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>')}
function badge(txt,bg,fg){return`<span class="tc-badge" style="background:${bg};color:${fg}">${esc(txt)}</span>`}
function rubricHTML(rubKey){
  const rows=RUBRICS[AL][rubKey];
  if(!rows)return'';
  const total=rows.reduce((a,r)=>a+r.max,0);
  let html=`<button class="rub-toggle" onclick="togRub(this)">&#9776; Rubric (${total} pts)</button>
  <table class="rub-table"><tr><th>Criterion</th><th>Max</th><th>Description</th></tr>`;
  rows.forEach(r=>{html+=`<tr><td><strong>${esc(r.criterion)}</strong></td><td class="rub-max">${r.max}</td><td>${esc(r.desc)}</td></tr>`});
  return html+`</table>`;
}
function togRub(btn){
  const tbl=btn.nextElementSibling;
  tbl.classList.toggle('show');
  btn.textContent=tbl.classList.contains('show')?'× Hide Rubric':'☰ Rubric ('+tbl.querySelectorAll('tr').length-1+' criteria)';
}
function progHTML(secIdx){
  return`<div class="prog-label" id="prog-label-${secIdx}">Progress</div>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar-${secIdx}" style="width:0%"></div></div>`;
}
function updProg(secIdx,done,total){
  const bar=document.getElementById('prog-bar-'+secIdx);
  const lbl=document.getElementById('prog-label-'+secIdx);
  if(bar){bar.style.width=total?Math.round(done/total*100)+'%':'0%'}
  if(lbl){lbl.textContent=`Progress: ${done}/${total} completed`}
}
function scoreBadge(score,max){
  const pct=max?score/max:0;
  const cls=pct>=0.8?'good':pct>=0.5?'mid':'low';
  return`<span class="score-badge ${cls}">${score}/${max}</span>`;
}

// ── RENDERERS ──────────────────────────────────────────────────────────
function rTheory(sec){
  let h='<div class="theory-grid">';
  sec.cards.forEach(c=>{
    h+=`<div class="tc" style="border-top-color:${c.color}">
      <div class="tc-header"><span class="tc-label">${esc(c.label)}</span>${badge(c.badge,LEVELS[AL].light,LEVELS[AL].color)}</div>
      <div class="tc-examples">${esc(c.examples)}</div>
      <div class="tc-rule">${esc(c.rule)}</div>
    </div>`;
  });
  return h+'</div>';
}
function rTheory2(sec){
  let h='';
  sec.groups.forEach(g=>{
    h+=`<div class="t2-group" style="border-left-color:${g.color}">
      <div class="t2-label" style="color:${g.color}">${esc(g.label)}</div>
      <div class="t2-verbs">${g.verbs.map(v=>`<span class="t2-verb" style="background:${LEVELS[AL].light};color:${g.color}">${esc(v)}</span>`).join('')}</div>
      <div class="t2-memory">${esc(g.memory)}</div>
      <div class="t2-example">${esc(g.example)}</div>
    </div>`;
  });
  return h;
}
function rTheory3(sec){
  let h='';
  sec.pairs.forEach(p=>{
    h+=`<div class="t3-pair">
      <div class="t3-spoken">✗ ${esc(p.spoken)}</div>
      <div class="t3-academic">✓ ${esc(p.academic)}</div>
      <div class="t3-change">💡 ${esc(p.change)}</div>
    </div>`;
  });
  h+=`<div class="t3-insight">🎯 <strong>Key Insight:</strong> ${esc(sec.insight)}</div>`;
  return h;
}
function rTheory4(sec){
  let h='<div class="t4-grid">';
  sec.cards.forEach(c=>{
    h+=`<div class="t4-card" style="border-top-color:${c.color}">
      <div class="t4-label">${esc(c.label)}</div>
      <div class="t4-desc">${esc(c.desc)}</div>
      <div class="t4-fix">${esc(c.fix)}</div>
    </div>`;
  });
  return h+'</div>';
}

function rSpot(sec,secIdx){
  const key=`${AL}_${secIdx}`;
  let h=rubricHTML(sec.rubricKey)+progHTML(secIdx);
  sec.items.forEach((it,i)=>{
    const cid=`${key}_${i}`;
    const sent=it.sentence.replace(it.underlined,`<u>${esc(it.underlined)}</u>`);
    const choices=[it.wrongWord,it.correctWord].sort(()=>Math.random()-0.5);
    h+=`<div class="spot-item" id="spot-wrap-${cid}">
      <div class="spot-num">Item ${i+1} of ${sec.items.length}</div>
      <div class="spot-sentence">${sent}</div>
      <div class="spot-choices">
        ${choices.map(ch=>`<button class="spot-choice" onclick="spotPick('${cid}','${esc(ch)}','${esc(it.correctWord)}')" id="sc-${cid}-${esc(ch)}">${esc(ch)}</button>`).join('')}
      </div>
      <div class="spot-feedback" id="sf-${cid}"></div>
    </div>`;
  });
  const rub=RUBRICS[AL][sec.rubricKey];
  const maxScore=rub?rub.reduce((a,r)=>a+r.max,0):0;
  h+=`<button class="spot-check-btn" id="spot-btn-${key}" onclick="calcSpot('${key}',${sec.items.length},${maxScore})">Check All</button>
  <div class="spot-score" id="spot-score-${key}" style="display:none"></div>`;
  return h;
}

function rFill(sec,secIdx){
  const key=`${AL}_${secIdx}`;
  let h=rubricHTML(sec.rubricKey)+progHTML(secIdx);
  sec.items.forEach((it,i)=>{
    const cid=`${key}_${i}`;
    h+=`<div class="fill-item">
      <div class="fill-num" style="font-size:.72rem;font-weight:700;color:#999;margin-bottom:6px;text-transform:uppercase">Item ${i+1}</div>
      <div class="fill-template">${esc(it.template)}</div>
      <div class="fill-base">🔑 Base: ${esc(it.baseWord)}</div>
      <div class="fill-input-row">
        <input class="fill-input" id="fi-${cid}" placeholder="${esc(it.hint)}" oninput="ST.inputs['${cid}']=this.value"/>
        <button class="fill-btn" id="fb-${cid}" onclick="fillChk('${cid}','${esc(it.answer)}','${esc(it.explanation)}')">Check</button>
      </div>
      <div class="fill-feedback" id="ff-${cid}"></div>
    </div>`;
  });
  const rub=RUBRICS[AL][sec.rubricKey];
  const maxScore=rub?rub.reduce((a,r)=>a+r.max,0):0;
  h+=`<button class="spot-check-btn" id="fill-score-btn-${key}" onclick="calcFill('${key}',${sec.items.length},${maxScore})" style="margin-top:4px">Show Score</button>
  <div class="spot-score" id="fill-score-${key}" style="display:none"></div>`;
  return h;
}

function rTransform(sec,secIdx){
  const key=`${AL}_${secIdx}`;
  let h=rubricHTML(sec.rubricKey)+progHTML(secIdx);
  sec.items.forEach((it,i)=>{
    const cid=`${key}_${i}`;
    h+=`<div class="tr-item">
      <div class="spot-num">Item ${i+1}</div>
      <div class="tr-spoken">“${esc(it.spoken)}”</div>
      <div class="tr-hint">💡 Hint: ${esc(it.hint)}</div>
      <textarea class="tr-textarea" id="tr-${cid}" placeholder="Write your academic version here…" oninput="ST.inputs['${cid}']=this.value"></textarea>
      <div class="tr-btns">
        <button class="tr-save-btn" onclick="saveTr('${cid}')">Save</button>
        <button class="tr-reveal-btn" onclick="revealTr('${cid}','${esc(it.answer)}','${esc(it.keyChange)}','${esc(it.principle)}')">Reveal Model Answer</button>
      </div>
      <div class="tr-answer" id="tra-${cid}"></div>
    </div>`;
  });
  return h;
}

function rLog(sec,secIdx){
  const key=`${AL}_${secIdx}`;
  let h=rubricHTML(sec.rubricKey);
  sec.prompts.forEach((pr,i)=>{
    const cid=`${key}_${i}`;
    h+=`<div class="log-item">
      <div class="log-prompt">${i+1}. ${esc(pr)}</div>
      <textarea class="log-textarea" id="lt-${cid}" placeholder="Write your response here…" oninput="ST.logs['${cid}']=this.value"></textarea>
      <button class="log-save-btn" onclick="saveLog('${cid}')">Save</button>
      <div class="log-saved" id="ls-${cid}">✓ Saved</div>
    </div>`;
  });
  h+=`<button class="log-all-btn" onclick="saveLogAll('${key}',${sec.prompts.length})">Save All Reflections</button>`;
  return h;
}

function renderSec(secIdx){
  const lv=LEVELS[AL];
  const sec=lv.sections[secIdx];
  AS=secIdx;
  let html=`<div class="sec-title">${esc(sec.title)}</div>`;
  if(sec.type==='theory'){html+=`<div class="sec-sub">Study these cards before attempting the exercises.</div>`+rTheory(sec)}
  else if(sec.type==='theory2'){html+=`<div class="sec-sub">Review the verb groups and their memory rules.</div>`+rTheory2(sec)}
  else if(sec.type==='theory3'){html+=`<div class="sec-sub">Study the spoken-to-academic transformations, then read the insight.</div>`+rTheory3(sec)}
  else if(sec.type==='theory4'){html+=`<div class="sec-sub">Study each strategy and its application before practising.</div>`+rTheory4(sec)}
  else if(sec.type==='spot'){html+=`<div class="sec-sub">Each sentence contains exactly one error. Choose the correct replacement.</div>`+rSpot(sec,secIdx)}
  else if(sec.type==='fill'){html+=`<div class="sec-sub">Use the base word given to complete each sentence.</div>`+rFill(sec,secIdx)}
  else if(sec.type==='transform'){html+=`<div class="sec-sub">Rewrite each informal sentence in formal academic English.</div>`+rTransform(sec,secIdx)}
  else if(sec.type==='log'){html+=`<div class="sec-sub">Reflect on today’s learning. Your notes are saved for download.</div>`+rLog(sec,secIdx)}
  document.getElementById('content').innerHTML=html;
  document.querySelectorAll('.sec-btn').forEach((b,i)=>b.classList.toggle('active',i===secIdx));
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── INTERACTIONS ───────────────────────────────────────────────────────
function spotPick(cid,chosen,correct){
  if(document.getElementById('spot-wrap-'+cid).querySelector('.locked'))return;
  const btns=document.querySelectorAll(`[id^="sc-${cid}-"]`);
  btns.forEach(b=>{
    b.classList.remove('selected','correct','wrong');
    b.classList.add('locked');
  });
  const chosenBtn=document.getElementById('sc-'+cid+'-'+chosen);
  const isOk=chosen===correct;
  if(chosenBtn){chosenBtn.classList.add(isOk?'correct':'wrong')}
  if(!isOk){
    const correctBtn=document.getElementById('sc-'+cid+'-'+correct);
    if(correctBtn)correctBtn.classList.add('correct');
  }
  ST.choices[cid]=isOk;
  const fb=document.getElementById('sf-'+cid);
  const sec=LEVELS[AL].sections[AS];
  const idx=parseInt(cid.split('_').pop());
  const it=sec.items[idx];
  fb.className='spot-feedback show '+(isOk?'ok':'err');
  fb.innerHTML=`<strong>${isOk?'✓ Correct!':'✗ Incorrect — the correct answer is: '+esc(correct)}</strong>
  <div class="fb-rule">📌 <em>Wrong type:</em> ${esc(it.wrongType)} → <em>Correct type:</em> ${esc(it.correctType)}<br>${esc(it.rule)}</div>
  <div class="fb-tip">💡 Tip: ${esc(it.tip)}</div>`;
}

function calcSpot(key,total,maxScore){
  let done=0,correct=0;
  for(let i=0;i<total;i++){
    const cid=`${key}_${i}`;
    if(ST.choices[cid]!==undefined){done++;if(ST.choices[cid])correct++}
  }
  const pct=total?Math.round(done/total*100):0;
  updProg(parseInt(key.split('_').pop()),done,total);
  const sd=document.getElementById('spot-score-'+key);
  sd.style.display='block';
  sd.innerHTML=`Score: ${scoreBadge(correct,total)} | Completed: ${done}/${total}`;
}

function fillChk(cid,answer,explanation){
  const inp=document.getElementById('fi-'+cid);
  const val=(inp.value||'').trim().toLowerCase();
  const ans=answer.toLowerCase();
  const isOk=val===ans||val===ans.replace(/\s+\//g,' /').replace(/\/ /g,'/');
  inp.classList.remove('correct','wrong');
  inp.classList.add(isOk?'correct':'wrong');
  document.getElementById('fb-'+cid).className='fill-feedback show '+(isOk?'ok':'err');
  document.getElementById('fb-'+cid).innerHTML=`<strong>${isOk?'✓ Correct!':'✗ The answer is: <em>'+esc(answer)+'</em>'}</strong><br>${esc(explanation)}`;
  ST.checked[cid]=isOk;
  document.getElementById('fb-'+cid+'btn')||null;
}

function calcFill(key,total,maxScore){
  let done=0,correct=0;
  for(let i=0;i<total;i++){
    const cid=`${key}_${i}`;
    const inp=document.getElementById('fi-'+cid);
    if(inp&&inp.value.trim()){done++;if(ST.checked[cid])correct++}
  }
  updProg(parseInt(key.split('_').pop()),done,total);
  const sd=document.getElementById('fill-score-'+key);
  sd.style.display='block';
  sd.innerHTML=`Score: ${scoreBadge(correct,total)} | Completed: ${done}/${total}`;
}

function saveTr(cid){
  const val=document.getElementById('tr-'+cid).value.trim();
  ST.inputs[cid]=val;
  alert(val?'✓ Response saved!':'Nothing to save — please write your answer first.');
}

function revealTr(cid,answer,keyChange,principle){
  const div=document.getElementById('tra-'+cid);
  div.className='tr-answer show';
  div.innerHTML=`<strong>🎯 Model Answer:</strong>${esc(answer)}<br><br><strong>🔄 Key Change:</strong> ${esc(keyChange)}<div class="tr-principle">📌 Principle: ${esc(principle)}</div>`;
}

function saveLog(cid){
  const val=document.getElementById('lt-'+cid).value.trim();
  ST.logs[cid]=val;
  const s=document.getElementById('ls-'+cid);
  s.className='log-saved show';
  setTimeout(()=>s.classList.remove('show'),2000);
}

function saveLogAll(key,total){
  for(let i=0;i<total;i++){
    const cid=`${key}_${i}`;
    const el=document.getElementById('lt-'+cid);
    if(el)ST.logs[cid]=el.value.trim();
  }
  alert('✓ All reflections saved. Use Download Report to export.');
}

// ── DOWNLOAD ───────────────────────────────────────────────────────────
function handleDownload(){
  const lv=LEVELS[AL];
  const now=new Date();
  let txt=`HUONG STELLA PARADIGM — Daily Drills Day 4\n`;
  txt+=`Level: ${lv.label} | Theme: ${lv.theme}\n`;
  txt+=`Date: ${now.toISOString().slice(0,10)}\n`;
  txt+=`${'='.repeat(60)}\n\n`;

  // Spot answers
  lv.sections.forEach((sec,si)=>{
    txt+=`SECTION: ${sec.title}\n${'-'.repeat(40)}\n`;
    const key=`${AL}_${si}`;
    if(sec.type==='spot'){
      sec.items.forEach((it,i)=>{
        const cid=`${key}_${i}`;
        const ans=ST.choices[cid];
        txt+=`Q${i+1}: ${it.sentence}\n`;
        txt+=`  Your answer: ${ans===undefined?'(not attempted)':ans?'Correct ✓':'Incorrect ✗'}\n`;
        txt+=`  Correct: ${it.correctWord}\n\n`;
      });
    } else if(sec.type==='fill'){
      sec.items.forEach((it,i)=>{
        const cid=`${key}_${i}`;
        const inp=ST.inputs[cid]||'(blank)';
        txt+=`Q${i+1}: ${it.template}\n`;
        txt+=`  Your answer: ${inp}\n`;
        txt+=`  Correct: ${it.answer}\n\n`;
      });
    } else if(sec.type==='transform'){
      sec.items.forEach((it,i)=>{
        const cid=`${key}_${i}`;
        txt+=`Transform ${i+1}: ${it.spoken}\n`;
        txt+=`  Your version: ${ST.inputs[cid]||'(not attempted)'}\n`;
        txt+=`  Model: ${it.answer}\n\n`;
      });
    } else if(sec.type==='log'){
      sec.prompts.forEach((pr,i)=>{
        const cid=`${key}_${i}`;
        txt+=`Reflection ${i+1}: ${pr}\n`;
        txt+=`  ${ST.logs[cid]||'(not completed)'}\n\n`;
      });
    }
    txt+='\n';
  });

  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`HuongStella_DailyDrill_Day4_`+AL+`_`+now.toISOString().slice(0,10)+`.txt`;
  a.click();
}

// ── NAV & INIT ─────────────────────────────────────────────────────────
function buildLvTabs(){
  const el=document.getElementById('lvTabs');
  el.innerHTML=Object.keys(LEVELS).map(k=>`<div class="lv-tab${k===AL?' active':''}" onclick="switchLv('${k}')" style="${k===AL?'color:'+LEVELS[k].color+';border-bottom-color:'+LEVELS[k].color:''}">${LEVELS[k].label}</div>`).join('');
}

function switchLv(lv){
  AL=lv;AS=0;
  ST.choices={};ST.inputs={};ST.checked={};ST.logs={};
  applyLevel();
  buildLvTabs();
  buildSecNav();
  renderSec(0);
}

function applyLevel(){
  const lv=LEVELS[AL];
  document.documentElement.style.setProperty('--lc',lv.color);
  document.documentElement.style.setProperty('--ll',lv.light);
  // Hero
  document.getElementById('hero').innerHTML=`
    <div class="hero-row">
      <div class="hero-badge">${esc(lv.label)}</div>
      <div class="hero-info">
        <div class="hero-theme">${esc(lv.theme)}</div>
        <div class="hero-tagline">${esc(lv.tagline)}</div>
        <div class="hero-goal">${esc(lv.goal)}</div>
        <div class="hero-time">⏱ Estimated time: ${esc(lv.time)}</div>
      </div>
    </div>`;
}

function buildSecNav(){
  const lv=LEVELS[AL];
  document.getElementById('secNav').innerHTML=lv.sections.map((s,i)=>`<button class="sec-btn${i===0?' active':''}" onclick="navSec(${i})">${esc(s.title)}</button>`).join('');
}

function navSec(i){
  AS=i;
  document.querySelectorAll('.sec-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  renderSec(i);
}

function init(){
  document.title='Daily Drills 4';
  buildLvTabs();
  applyLevel();
  buildSecNav();
  renderSec(0);
}

window.addEventListener('DOMContentLoaded',init);
</script>
