<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daily Drills 5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--lc:#2D6A4F;--ll:#D8F3DC;--bg:#F4F2EF;--hdr:#111;--radius:10px;--shadow:0 2px 12px rgba(0,0,0,.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#1a1a1a;min-height:100vh}
a{color:inherit}
header{background:var(--hdr);color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{font-size:.7rem;font-weight:700;letter-spacing:.18em;opacity:.55;text-transform:uppercase}
.hdr-centre{text-align:center}
.hdr-day{font-size:1.35rem;font-weight:800;letter-spacing:-.01em}
.hdr-sub{font-size:.75rem;opacity:.55;margin-top:2px}
.hdr-right{display:flex;gap:10px;align-items:center}
.dl-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:6px 14px;font-size:.78rem;font-weight:600;cursor:pointer;transition:background .18s}
.dl-btn:hover{background:rgba(255,255,255,.22)}
#lvTabs{display:flex;gap:0;border-bottom:2px solid #e0ddd8;background:#fff;padding:0 20px;overflow-x:auto}
.lv-tab{padding:12px 22px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .18s;white-space:nowrap;color:#666}
.lv-tab.active{border-bottom-color:var(--lc);color:var(--lc)}
#secNav{background:#fff;border-bottom:1px solid #e8e5e0;padding:10px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sec-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;background:#fff;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .18s;color:#555}
.sec-btn.active{background:var(--lc);border-color:var(--lc);color:#fff}
main{max-width:860px;margin:0 auto;padding:28px 20px 60px}
.sec-header{margin-bottom:22px}
.sec-title{font-size:1.15rem;font-weight:700;color:#111;margin-bottom:4px}
.level-banner{background:var(--ll);border-left:4px solid var(--lc);border-radius:8px;padding:14px 18px;margin-bottom:24px}
.level-banner h2{font-size:1rem;font-weight:700;color:var(--lc);margin-bottom:3px}
.level-banner .tagline{font-size:.85rem;color:#444;margin-bottom:6px}
.level-banner .goal{font-size:.82rem;color:#555;line-height:1.55}
.level-banner .time-badge{display:inline-block;background:var(--lc);color:#fff;border-radius:12px;padding:2px 10px;font-size:.72rem;font-weight:600;margin-top:8px}
/* Theory cards */
.theory-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.theory-card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border-top:4px solid var(--lc)}
.theory-card .tc-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.theory-card .tc-label{font-weight:800;font-size:.95rem;color:#111}
.badge{display:inline-block;border-radius:4px;padding:2px 8px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.theory-card .tc-examples{font-family:'JetBrains Mono',monospace;font-size:.8rem;background:#f5f3f0;border-radius:6px;padding:10px 12px;margin-bottom:10px;line-height:1.65;color:#2a2a2a}
.theory-card .tc-rule{font-size:.82rem;color:#444;line-height:1.6}
/* Theory2 groups */
.theory2-grid{display:grid;gap:16px;margin-bottom:24px}
.theory2-card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border-left:5px solid var(--lc)}
.theory2-card .t2-label{font-weight:700;font-size:.9rem;margin-bottom:10px;color:#111}
.verb-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.verb-chip{background:var(--ll);color:var(--lc);border-radius:4px;padding:3px 10px;font-size:.78rem;font-weight:600;font-family:'JetBrains Mono',monospace}
.theory2-card .memory{font-size:.8rem;background:#fafaf8;border:1px solid #e8e5e0;border-radius:6px;padding:8px 12px;margin-bottom:8px;color:#555;line-height:1.55}
.theory2-card .example{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:#2a2a2a;background:#f5f3f0;padding:8px 12px;border-radius:6px}
/* Theory3 pairs */
.theory3-grid{display:grid;gap:14px;margin-bottom:24px}
.theory3-pair{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.t3-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.t3-box{border-radius:6px;padding:10px 12px;font-size:.82rem;line-height:1.55}
.t3-spoken{background:#fff3cd;border:1px solid #ffd96e}
.t3-academic{background:#d4edda;border:1px solid #80c780}
.t3-box .t3-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;opacity:.65}
.t3-change{font-size:.78rem;color:#555;background:#f5f3f0;border-radius:6px;padding:8px 12px;line-height:1.55}
.theory3-insight{background:var(--ll);border:1px solid var(--lc);border-radius:8px;padding:14px 18px;margin-bottom:24px;font-size:.84rem;line-height:1.6;color:#333}
.theory3-insight strong{color:var(--lc)}
/* Theory4 cards */
.theory4-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:24px}
.theory4-card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border-top:4px solid var(--lc)}
.theory4-card .t4-label{font-weight:800;font-size:.88rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;color:var(--lc)}
.theory4-card .t4-desc{font-size:.81rem;color:#444;line-height:1.6;margin-bottom:10px}
.theory4-card .t4-fix{font-size:.8rem;background:#f5f3f0;border-radius:6px;padding:10px 12px;color:#2a2a2a;line-height:1.6}
.theory4-card .t4-fix::before{content:"✦ Apply: ";font-weight:700;color:var(--lc)}
/* Spot the Error */
.spot-item{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
.spot-num{font-size:.7rem;font-weight:700;color:var(--lc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.spot-sentence{font-size:.92rem;line-height:1.65;margin-bottom:14px;color:#111}
.spot-sentence .underline{text-decoration:underline;text-decoration-color:var(--lc);text-decoration-thickness:2px;font-weight:600;color:var(--lc)}
.spot-choices{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.spot-choice{padding:7px 16px;border-radius:6px;border:1.5px solid #ddd;background:#fafaf8;font-size:.83rem;cursor:pointer;transition:all .18s;font-weight:500}
.spot-choice:hover{border-color:var(--lc);background:var(--ll)}
.spot-choice.correct{background:#d4edda;border-color:#28a745;color:#155724}
.spot-choice.wrong{background:#f8d7da;border-color:#dc3545;color:#721c24}
.spot-feedback{font-size:.8rem;border-radius:6px;padding:10px 14px;line-height:1.6;margin-top:6px;display:none}
.spot-feedback.show{display:block}
.spot-feedback.correct-fb{background:#d4edda;border:1px solid #c3e6cb;color:#155724}
.spot-feedback.wrong-fb{background:#f8d7da;border:1px solid #f5c6cb;color:#721c24}
.spot-tip{font-size:.78rem;background:#fff9e6;border:1px solid #ffd96e;border-radius:6px;padding:8px 12px;margin-top:8px;color:#5a4000}
.spot-tip::before{content:"💡 Tip: ";font-weight:700}
.calc-btn{margin-top:16px;background:var(--lc);color:#fff;border:none;border-radius:6px;padding:9px 22px;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .18s}
.calc-btn:hover{filter:brightness(1.12)}
.score-box{margin-top:14px;padding:12px 16px;border-radius:8px;background:var(--ll);font-size:.88rem;font-weight:600;display:none}
.score-box.show{display:block}
/* Fill */
.fill-item{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.fill-num{font-size:.7rem;font-weight:700;color:var(--lc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.fill-template{font-size:.9rem;line-height:1.65;margin-bottom:12px;color:#111}
.fill-base{display:inline-block;background:var(--ll);color:var(--lc);border-radius:4px;padding:2px 8px;font-size:.78rem;font-weight:600;font-family:'JetBrains Mono',monospace;margin-bottom:10px}
.fill-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.fill-input{border:1.5px solid #ddd;border-radius:6px;padding:7px 12px;font-size:.88rem;font-family:'Inter',sans-serif;min-width:160px;outline:none;transition:border-color .18s}
.fill-input:focus{border-color:var(--lc)}
.fill-input.correct{border-color:#28a745;background:#d4edda}
.fill-input.wrong{border-color:#dc3545;background:#f8d7da}
.chk-btn{padding:7px 16px;border-radius:6px;border:1.5px solid var(--lc);background:var(--ll);color:var(--lc);font-size:.83rem;font-weight:600;cursor:pointer;transition:all .18s}
.chk-btn:hover{background:var(--lc);color:#fff}
.fill-fb{font-size:.8rem;border-radius:6px;padding:9px 13px;line-height:1.6;margin-top:8px;display:none}
.fill-fb.show{display:block}
.fill-fb.correct-fb{background:#d4edda;border:1px solid #c3e6cb;color:#155724}
.fill-fb.wrong-fb{background:#f8d7da;border:1px solid #f5c6cb;color:#721c24}
/* Transform */
.transform-item{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:16px}
.tr-num{font-size:.7rem;font-weight:700;color:var(--lc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.tr-spoken{background:#fff9e6;border:1px solid #ffd96e;border-radius:6px;padding:10px 14px;font-size:.87rem;line-height:1.6;margin-bottom:10px;color:#3a3000}
.tr-spoken::before{content:"Spoken: ";font-weight:700}
.tr-hint-box{font-size:.78rem;color:#666;background:#f5f3f0;border-radius:6px;padding:7px 12px;margin-bottom:10px;font-family:'JetBrains Mono',monospace}
.tr-hint-box::before{content:"Hint: ";font-weight:700;font-family:'Inter',sans-serif}
.tr-textarea{width:100%;border:1.5px solid #ddd;border-radius:6px;padding:10px 13px;font-size:.87rem;font-family:'Inter',sans-serif;min-height:80px;resize:vertical;outline:none;transition:border-color .18s;line-height:1.6}
.tr-textarea:focus{border-color:var(--lc)}
.tr-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.tr-save-btn{padding:7px 16px;border-radius:6px;border:1.5px solid var(--lc);background:var(--ll);color:var(--lc);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .18s}
.tr-save-btn:hover{background:var(--lc);color:#fff}
.tr-reveal-btn{padding:7px 16px;border-radius:6px;border:1.5px solid #aaa;background:#f5f3f0;color:#555;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .18s}
.tr-reveal-btn:hover{background:#e0ddd8}
.tr-model{display:none;margin-top:12px;border-radius:8px;overflow:hidden}
.tr-model.show{display:block}
.tr-model-answer{background:#d4edda;border:1px solid #c3e6cb;padding:12px 14px;font-size:.85rem;line-height:1.6;color:#155724}
.tr-model-answer::before{content:"Model answer: ";font-weight:700}
.tr-model-meta{background:#f5f3f0;border:1px solid #e0ddd8;padding:10px 14px}
.tr-key-change{font-size:.79rem;color:#444;margin-bottom:6px;line-height:1.55}
.tr-key-change::before{content:"Key change: ";font-weight:700;color:#111}
.tr-principle{font-size:.79rem;color:#5A1A8A;font-style:italic;line-height:1.55}
.tr-principle::before{content:"Principle: ";font-weight:700;font-style:normal}
/* Log */
.log-item{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.log-num{font-size:.7rem;font-weight:700;color:var(--lc);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.log-prompt{font-size:.88rem;line-height:1.6;margin-bottom:12px;color:#222}
.log-textarea{width:100%;border:1.5px solid #ddd;border-radius:6px;padding:10px 13px;font-size:.86rem;font-family:'Inter',sans-serif;min-height:90px;resize:vertical;outline:none;transition:border-color .18s;line-height:1.6}
.log-textarea:focus{border-color:var(--lc)}
.log-save-btn{margin-top:8px;padding:6px 16px;border-radius:6px;border:1.5px solid var(--lc);background:var(--ll);color:var(--lc);font-size:.82rem;font-weight:600;cursor:pointer;transition:all .18s}
.log-save-btn:hover{background:var(--lc);color:#fff}
.log-saved{font-size:.75rem;color:#28a745;margin-left:10px;display:none}
.log-saved.show{display:inline}
.log-save-all-btn{background:var(--lc);color:#fff;border:none;border-radius:6px;padding:9px 22px;font-size:.85rem;font-weight:600;cursor:pointer;margin-top:8px;transition:background .18s}
.log-save-all-btn:hover{filter:brightness(1.12)}
/* Rubric */
.rubric-toggle{font-size:.78rem;color:var(--lc);cursor:pointer;font-weight:600;background:none;border:none;padding:4px 0;margin-top:16px;text-decoration:underline}
.rubric-box{display:none;margin-top:10px;border:1px solid #e0ddd8;border-radius:8px;overflow:hidden}
.rubric-box.show{display:block}
.rubric-row{display:grid;grid-template-columns:1fr auto;align-items:start;gap:12px;padding:10px 14px;border-bottom:1px solid #f0ede8}
.rubric-row:last-child{border-bottom:none}
.rubric-row:nth-child(even){background:#fafaf8}
.rubric-crit{font-size:.81rem;font-weight:600;color:#222;margin-bottom:2px}
.rubric-desc{font-size:.77rem;color:#666;line-height:1.5}
.rubric-max{background:var(--lc);color:#fff;border-radius:12px;padding:2px 9px;font-size:.75rem;font-weight:700;white-space:nowrap}
/* Progress */
.prog-bar-wrap{height:6px;background:#e0ddd8;border-radius:3px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:var(--lc);border-radius:3px;transition:width .35s ease}
.score-badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:.78rem;font-weight:700;margin-left:8px}
.score-badge.good{background:#d4edda;color:#155724}
.score-badge.mid{background:#fff3cd;color:#856404}
.score-badge.low{background:#f8d7da;color:#721c24}
@media(max-width:600px){
  .t3-row{grid-template-columns:1fr}
  header{flex-direction:column;text-align:center;gap:8px}
  .hdr-right{justify-content:center}
}
</style>
</head>
<body>
<header>
  <span class="brand">Huong Stella Paradigm</span>
  <div class="hdr-centre">
    <div class="hdr-day">Day 5 · Interactive Practice</div>
    <div class="hdr-sub">Quantifiers &amp; Comparison</div>
  </div>
  <div class="hdr-right">
    <button class="dl-btn" onclick="handleDownload()">⬇ Download</button>
  </div>
</header>
<nav id="lvTabs"></nav>
<div id="secNav"></div>
<main id="content"></main>

<script>
const DAY = 5;
const THEME = "Quantifiers & Comparison";

const RUBRICS = {
  a2b1: {
    spot: [
      {criterion:"Identifies the incorrect quantifier",max:1,desc:"Selects the underlined error correctly"},
      {criterion:"Understands countable vs uncountable distinction",max:1,desc:"Can explain why much/many/few/little is wrong"},
      {criterion:"Applies correct replacement",max:1,desc:"Chooses the appropriate quantifier for the noun type"}
    ],
    fill: [
      {criterion:"Correct quantifier selected",max:2,desc:"Chooses the right quantifier (much/many/few/little/a few/a little) for each gap"},
      {criterion:"Noun type awareness",max:1,desc:"Demonstrates awareness of whether the noun is countable or uncountable"}
    ],
    log: [
      {criterion:"Error identified and corrected",max:2,desc:"Finds a real error and applies the correct rule"},
      {criterion:"Rule explained clearly",max:2,desc:"Articulates the countable/uncountable distinction in own words"},
      {criterion:"Original sentences are accurate",max:2,desc:"Uses quantifiers correctly in self-generated examples"}
    ]
  },
  b1b2: {
    spot: [
      {criterion:"Identifies the comparison error",max:1,desc:"Correctly pinpoints the error (double comparative, missing 'the', wrong form, etc.)"},
      {criterion:"Selects the correct form",max:1,desc:"Provides the correct comparative or superlative"},
      {criterion:"Demonstrates rule awareness",max:1,desc:"Distinguishes short vs long adjective rules and as...as structure"}
    ],
    fill: [
      {criterion:"Correct comparative/superlative form",max:2,desc:"Produces the right form for short and long adjectives"},
      {criterion:"Correct use of 'the' with superlatives",max:1,desc:"Does not omit the definite article before superlatives"}
    ],
    log: [
      {criterion:"Error analysis is accurate",max:2,desc:"Correctly identifies and explains the comparison mistake"},
      {criterion:"Forms recalled correctly",max:2,desc:"Comparative and superlative forms for irregular adjectives are correct"},
      {criterion:"Comparison sentences are accurate and varied",max:2,desc:"Uses all three structures (comparative, superlative, as...as) correctly"}
    ]
  },
  b2c1: {
    spot: [
      {criterion:"Identifies the quantifier/scope error",max:1,desc:"Correctly locates and names the error type"},
      {criterion:"Provides an academically appropriate correction",max:2,desc:"The replacement is both grammatically correct and academically precise"},
      {criterion:"Explains the principle",max:1,desc:"Articulates why the original phrasing is problematic in academic writing"}
    ],
    fill: [
      {criterion:"Correct academic quantifier selected",max:2,desc:"Uses 'number of', 'majority of', 'relatively few', etc. correctly"},
      {criterion:"Appropriate register maintained",max:1,desc:"Response is academic in tone, not colloquial"}
    ],
    transform: [
      {criterion:"Quantifier upgraded accurately",max:2,desc:"Vague quantifier replaced with precise academic alternative"},
      {criterion:"Hedging applied appropriately",max:1,desc:"Certainty is not overstated; hedging verbs and adverbs used where needed"},
      {criterion:"Sentence is grammatically accurate",max:1,desc:"No grammatical errors introduced in the transformation"}
    ],
    log: [
      {criterion:"Quantifier revision is well-motivated",max:2,desc:"Identifies a genuine improvement and applies correct academic form"},
      {criterion:"Countable/uncountable rule applied to academic context",max:2,desc:"Explains 'number of' vs 'amount of' accurately"},
      {criterion:"Original academic sentence is hedged and precise",max:2,desc:"Produces a qualified generalisation using appropriate academic quantifier"}
    ]
  },
  c1c2: {
    spot: [
      {criterion:"Identifies the scope/epistemic error",max:1,desc:"Correctly names the logical or rhetorical problem"},
      {criterion:"Provides a fully qualified correction",max:2,desc:"Replacement includes appropriate hedging and scope restriction"},
      {criterion:"Explanation addresses discourse-level logic",max:1,desc:"Goes beyond grammar to discuss the argumentative implications"}
    ],
    fill: [
      {criterion:"Correct academic term or form supplied",max:2,desc:"Identifies the precise lexical item required by academic convention"},
      {criterion:"Demonstrates awareness of research design vocabulary",max:1,desc:"Terms like 'generalisability', 'internal validity', 'ecological validity' used correctly"}
    ],
    transform: [
      {criterion:"Epistemic hedging is sophisticated and precise",max:2,desc:"Uses modal verbs, adverbs, and qualifiers at C2 level"},
      {criterion:"Register is consistently academic",max:1,desc:"No colloquial language; all lexis is field-appropriate"},
      {criterion:"Generalisability constraints are explicitly acknowledged",max:1,desc:"Scope of claims is clearly bounded in the transformed sentence"}
    ],
    log: [
      {criterion:"Critical evaluation of source text is perceptive",max:2,desc:"Identifies specific hedging strategies or their absence with textual evidence"},
      {criterion:"Distinction between validity and generalisability is accurate",max:2,desc:"Explanation is conceptually correct and well-illustrated"},
      {criterion:"Self-generated claims show C2 precision",max:2,desc:"Annotated versions demonstrate mastery of epistemic hedging and scope qualification"}
    ]
  }
};

const LEVELS = {
  a2b1: {
    label:"A2–B1", color:"#2D6A4F", light:"#D8F3DC",
    theme:"Quantifiers: much / many / few / little",
    tagline:"Master the four core quantifiers by matching them to noun type.",
    goal:"Today you will: (1) distinguish countable from uncountable nouns; (2) choose the correct quantifier (much, many, few, little, a few, a little); (3) spot and fix typical quantifier errors.",
    time:"10–15 min",
    sections:[
      {
        title:"Warm-Up: Quantifier Cards",
        type:"theory",
        cards:[
          {
            label:"MUCH",
            badge:"uncountable",
            color:"#2D6A4F",
            examples:"I don’t have <b>much</b> time. | There isn’t <b>much</b> water in the bottle. | How <b>much</b> money do you need?",
            rule:"Use <b>much</b> with <em>uncountable</em> nouns (nouns with no plural form: time, water, money, information, advice, traffic, furniture, homework). Mainly used in negatives and questions; in positive sentences, prefer ‘a lot of’."
          },
          {
            label:"MANY",
            badge:"countable plural",
            color:"#1A6B3A",
            examples:"There aren’t <b>many</b> seats left. | How <b>many</b> students are in your class? | <b>Many</b> people disagree.",
            rule:"Use <b>many</b> with <em>countable plural</em> nouns (nouns you can count: seats, students, people, problems, books, countries). Works in negatives, questions, and positive sentences."
          },
          {
            label:"A FEW vs FEW",
            badge:"countable",
            color:"#0D5C3E",
            examples:"I have <b>a few</b> friends here. (= some — positive) | <b>Few</b> students passed the exam. (= not many — negative meaning)",
            rule:"<b>A few</b> = a small number, enough — positive tone. <b>Few</b> = not many, not enough — negative tone. Both go with <em>countable plural</em> nouns only. Tip: the article ‘a’ makes it positive, just like ‘a’ adds hope."
          },
          {
            label:"A LITTLE vs LITTLE",
            badge:"uncountable",
            color:"#145233",
            examples:"She has <b>a little</b> money saved. (= some — positive) | <b>Little</b> time remains before the deadline. (= not much — negative meaning)",
            rule:"<b>A little</b> = a small amount, enough — positive tone. <b>Little</b> = not much, not enough — negative tone. Both go with <em>uncountable</em> nouns only. Memory trick: ‘little’ matches ‘little hope’ — gloomy without the article."
          }
        ]
      },

let AL = 'a2b1', AS = 0;
const ST = {choices:{}, inputs:{}, checked:{}, logs:{}};

function init() {
  document.title = 'Daily Drills 5';
  buildLvTabs();
  applyLevel();
}

function buildLvTabs() {
  const nav = document.getElementById('lvTabs');
  nav.innerHTML = '';
  Object.keys(LEVELS).forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'lv-tab' + (k === AL ? ' active' : '');
    btn.textContent = LEVELS[k].label;
    btn.style.setProperty('--lc', LEVELS[k].color);
    btn.onclick = () => switchLv(k);
    nav.appendChild(btn);
  });
}

function switchLv(lv) {
  AL = lv; AS = 0;
  document.querySelectorAll('.lv-tab').forEach((b,i) => {
    b.classList.toggle('active', Object.keys(LEVELS)[i] === lv);
  });
  applyLevel();
}

function applyLevel() {
  const lv = LEVELS[AL];
  document.documentElement.style.setProperty('--lc', lv.color);
  document.documentElement.style.setProperty('--ll', lv.light);
  buildSecNav();
  renderSec();
}

function buildSecNav() {
  const lv = LEVELS[AL];
  const nav = document.getElementById('secNav');
  nav.innerHTML = '';
  lv.sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'sec-btn' + (i === AS ? ' active' : '');
    btn.textContent = (i+1) + '. ' + sec.title;
    btn.onclick = () => navSec(i);
    nav.appendChild(btn);
  });
}

function navSec(i) {
  AS = i;
  document.querySelectorAll('.sec-btn').forEach((b,j) => b.classList.toggle('active', j===i));
  renderSec();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderSec() {
  const lv = LEVELS[AL];
  const sec = lv.sections[AS];
  const el = document.getElementById('content');
  let html = '';
  if (AS === 0) {
    html += `<div class="level-banner">
      <h2>${esc(lv.label)} — ${esc(lv.theme)}</h2>
      <div class="tagline">${esc(lv.tagline)}</div>
      <div class="goal">${esc(lv.goal)}</div>
      <span class="time-badge">⏱ ${esc(lv.time)}</span>
    </div>`;
  }
  html += `<div class="sec-header"><div class="sec-title">${esc(sec.title)}</div></div>`;
  if (sec.type === 'theory') html += rTheory(sec);
  else if (sec.type === 'theory2') html += rTheory2(sec);
  else if (sec.type === 'theory3') html += rTheory3(sec);
  else if (sec.type === 'theory4') html += rTheory4(sec);
  else if (sec.type === 'spot') html += rSpot(sec);
  else if (sec.type === 'fill') html += rFill(sec);
  else if (sec.type === 'transform') html += rTransform(sec);
  else if (sec.type === 'log') html += rLog(sec);
  el.innerHTML = html;
}

function rTheory(sec) {
  return `<div class="theory-grid">${sec.cards.map(c => `
    <div class="theory-card" style="border-top-color:${c.color}">
      <div class="tc-head">
        <span class="tc-label">${esc(c.label)}</span>
        ${badge(c.badge, c.color)}
      </div>
      <div class="tc-examples">${c.examples}</div>
      <div class="tc-rule">${c.rule}</div>
    </div>`).join('')}</div>`;
}

function rTheory2(sec) {
  return `<div class="theory2-grid">${sec.groups.map(g => `
    <div class="theory2-card" style="border-left-color:${g.color}">
      <div class="t2-label">${esc(g.label)}</div>
      <div class="verb-chips">${g.verbs.map(v=>`<span class="verb-chip">${esc(v)}</span>`).join('')}</div>
      <div class="memory">🧠 ${esc(g.memory)}</div>
      <div class="example">${g.example}</div>
    </div>`).join('')}</div>`;
}

function rTheory3(sec) {
  let html = `<div class="theory3-grid">`;
  sec.pairs.forEach(p => {
    html += `<div class="theory3-pair">
      <div class="t3-row">
        <div class="t3-box t3-spoken"><div class="t3-lbl">Spoken</div>${esc(p.spoken)}</div>
        <div class="t3-box t3-academic"><div class="t3-lbl">Academic</div>${esc(p.academic)}</div>
      </div>
      <div class="t3-change">🔄 ${p.change}</div>
    </div>`;
  });
  html += `</div>`;
  if (sec.insight) {
    html += `<div class="theory3-insight"><strong>Key Principle:</strong> ${esc(sec.insight)}</div>`;
  }
  return html;
}

function rTheory4(sec) {
  return `<div class="theory4-grid">${sec.cards.map(c => `
    <div class="theory4-card" style="border-top-color:${c.color}">
      <div class="t4-label" style="color:${c.color}">${esc(c.label)}</div>
      <div class="t4-desc">${esc(c.desc)}</div>
      <div class="t4-fix">${esc(c.fix)}</div>
    </div>`).join('')}</div>`;
}

function rSpot(sec) {
  const sKey = AL+'_'+AS;
  let html = '';
  sec.items.forEach((item, i) => {
    const sentParts = item.sentence.replace(item.underlined,
      `<span class="underline">${esc(item.underlined)}</span>`);
    const choice = ST.choices[sKey+'_'+i];
    const isCorrect = choice === 'correct';
    const isWrong = choice === 'wrong';
    html += `<div class="spot-item" id="spot_${AS}_${i}">
      <div class="spot-num">Item ${i+1} of ${sec.items.length}</div>
      <div class="spot-sentence">${sentParts}</div>
      <div class="spot-choices">
        <button class="spot-choice${choice==='correct'?' correct':choice==='wrong_a'?' wrong':''}" onclick="spotPick(${AS},${i},'wrong_a','${esc(item.wrongWord)}','${esc(item.correctWord)}')">
          A: Keep as is (correct)
        </button>
        <button class="spot-choice${choice==='correct_b'?' correct':choice==='wrong'?' wrong':''}" onclick="spotPick(${AS},${i},'correct_b','${esc(item.wrongWord)}','${esc(item.correctWord)}')">
          B: "${esc(item.correctWord)}" — ${esc(item.correctType)}
        </button>
      </div>
      <div class="spot-feedback${isCorrect||choice==='correct_b'?' correct-fb show':isWrong||choice==='wrong_a'?' wrong-fb show':''}" id="spfb_${AS}_${i}">
        ${choice ? (choice==='correct_b' ?
          `✓ Correct! ${esc(item.rule)}` :
          `✗ The underlined phrase contains an error. ${esc(item.rule)}`)
        : ''}
      </div>
      ${choice ? `<div class="spot-tip">${esc(item.tip)}</div>` : ''}
    </div>`;
  });
  const rubKey = sec.rubricKey || 'spot';
  html += `<button class="calc-btn" onclick="calcSpot(${AS})">Calculate Score</button>`;
  html += `<div class="score-box" id="score_spot_${AS}"></div>`;
  html += `<button class="rubric-toggle" onclick="togRub('rub_spot_${AS}')">Show rubric</button>`;
  html += `<div class="rubric-box" id="rub_spot_${AS}">${rubricHTML(RUBRICS[AL][rubKey])}</div>`;
  return html;
}

function spotPick(secIdx, itemIdx, choice, wrongWord, correctWord) {
  const sKey = AL+'_'+secIdx+'_'+itemIdx;
  ST.choices[sKey] = choice;
  const isCorrect = choice === 'correct_b';
  const fbEl = document.getElementById(`spfb_${secIdx}_${itemIdx}`);
  const sec = LEVELS[AL].sections[secIdx];
  const item = sec.items[itemIdx];
  const itemEl = document.getElementById(`spot_${secIdx}_${itemIdx}`);
  // update choice buttons
  const btns = itemEl.querySelectorAll('.spot-choice');
  btns[0].className = 'spot-choice' + (choice==='wrong_a'?' wrong':'');
  btns[1].className = 'spot-choice' + (choice==='correct_b'?' correct':'');
  // update feedback
  fbEl.className = 'spot-feedback show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
  fbEl.innerHTML = isCorrect
    ? `✓ Correct! ${esc(item.rule)}`
    : `✗ The underlined phrase contains an error. ${esc(item.rule)}`;
  // show tip
  let tip = itemEl.querySelector('.spot-tip');
  if (!tip) {
    tip = document.createElement('div');
    tip.className = 'spot-tip';
    itemEl.appendChild(tip);
  }
  tip.textContent = item.tip;
}

function calcSpot(secIdx) {
  const sec = LEVELS[AL].sections[secIdx];
  let correct = 0;
  sec.items.forEach((_, i) => {
    const sKey = AL+'_'+secIdx+'_'+i;
    if (ST.choices[sKey] === 'correct_b') correct++;
  });
  const total = sec.items.length;
  const el = document.getElementById(`score_spot_${secIdx}`);
  el.className = 'score-box show';
  el.innerHTML = `Spot-the-Error: ${correct}/${total} correct ${scoreBadge(correct, total)}`;
}

function rFill(sec) {
  const sKey = AL+'_'+AS;
  let html = '';
  sec.items.forEach((item, i) => {
    const checked = ST.checked[sKey+'_'+i];
    const userVal = ST.inputs[sKey+'_'+i] || '';
    html += `<div class="fill-item">
      <div class="fill-num">Item ${i+1} of ${sec.items.length}</div>
      <div class="fill-template">${esc(item.template)}</div>
      <div class="fill-base">${esc(item.baseWord)}</div>
      <div class="fill-row">
        <input class="fill-input${checked==='correct'?' correct':checked==='wrong'?' wrong':''}"
          id="fill_${AS}_${i}" type="text" placeholder="${esc(item.hint)}"
          value="${esc(userVal)}"
          onkeydown="if(event.key==='Enter')fillChk(${AS},${i})">
        <button class="chk-btn" onclick="fillChk(${AS},${i})">Check</button>
      </div>
      <div class="fill-fb${checked==='correct'?' correct-fb show':checked==='wrong'?' wrong-fb show':''}" id="fillfb_${AS}_${i}">
        ${checked==='correct' ? `✓ Correct! ${esc(item.explanation)}` :
          checked==='wrong' ? `✗ The answer is: <strong>${esc(item.answer)}</strong>. ${esc(item.explanation)}` : ''}
      </div>
    </div>`;
  });
  const rubKey = sec.rubricKey || 'fill';
  html += `<button class="calc-btn" onclick="calcFill(${AS})">Calculate Score</button>`;
  html += `<div class="score-box" id="score_fill_${AS}"></div>`;
  html += `<button class="rubric-toggle" onclick="togRub('rub_fill_${AS}')">Show rubric</button>`;
  html += `<div class="rubric-box" id="rub_fill_${AS}">${rubricHTML(RUBRICS[AL][rubKey])}</div>`;
  return html;
}

function fillChk(secIdx, itemIdx) {
  const sec = LEVELS[AL].sections[secIdx];
  const item = sec.items[itemIdx];
  const inp = document.getElementById(`fill_${secIdx}_${itemIdx}`);
  const userVal = inp.value.trim();
  const sKey = AL+'_'+secIdx+'_'+itemIdx;
  ST.inputs[sKey] = userVal;
  const correct = userVal.toLowerCase() === item.answer.toLowerCase();
  ST.checked[sKey] = correct ? 'correct' : 'wrong';
  inp.className = 'fill-input ' + (correct ? 'correct' : 'wrong');
  const fb = document.getElementById(`fillfb_${secIdx}_${itemIdx}`);
  fb.className = 'fill-fb show ' + (correct ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = correct
    ? `✓ Correct! ${esc(item.explanation)}`
    : `✗ The answer is: <strong>${esc(item.answer)}</strong>. ${esc(item.explanation)}`;
}

function calcFill(secIdx) {
  const sec = LEVELS[AL].sections[secIdx];
  let correct = 0;
  sec.items.forEach((_, i) => {
    const sKey = AL+'_'+secIdx+'_'+i;
    if (ST.checked[sKey] === 'correct') correct++;
  });
  const total = sec.items.length;
  const el = document.getElementById(`score_fill_${secIdx}`);
  el.className = 'score-box show';
  el.innerHTML = `Fill in the Blank: ${correct}/${total} correct ${scoreBadge(correct, total)}`;
}

function rTransform(sec) {
  let html = '';
  sec.items.forEach((item, i) => {
    const savedKey = AL+'_'+AS+'_'+i;
    const savedVal = ST.inputs['tr_'+savedKey] || '';
    const revealed = ST.checked['tr_reveal_'+savedKey];
    html += `<div class="transform-item">
      <div class="tr-num">Item ${i+1} of ${sec.items.length}</div>
      <div class="tr-spoken">${esc(item.spoken)}</div>
      <div class="tr-hint-box">${esc(item.hint)}</div>
      <textarea class="tr-textarea" id="tr_${AS}_${i}" placeholder="Write your academic version here…">${esc(savedVal)}</textarea>
      <div class="tr-btns">
        <button class="tr-save-btn" onclick="saveTr(${AS},${i})">Save</button>
        <button class="tr-reveal-btn" onclick="revealTr(${AS},${i})">Reveal model answer</button>
      </div>
      <div class="tr-model${revealed?' show':''}" id="trmodel_${AS}_${i}">
        <div class="tr-model-answer">${esc(item.answer)}</div>
        <div class="tr-model-meta">
          <div class="tr-key-change">${esc(item.keyChange)}</div>
          <div class="tr-principle">${esc(item.principle)}</div>
        </div>
      </div>
    </div>`;
  });
  const rubKey = sec.rubricKey || 'transform';
  html += `<button class="rubric-toggle" onclick="togRub('rub_tr_${AS}')">Show rubric</button>`;
  html += `<div class="rubric-box" id="rub_tr_${AS}">${rubricHTML(RUBRICS[AL][rubKey])}</div>`;
  return html;
}

function saveTr(secIdx, itemIdx) {
  const key = AL+'_'+secIdx+'_'+itemIdx;
  const val = document.getElementById(`tr_${secIdx}_${itemIdx}`).value;
  ST.inputs['tr_'+key] = val;
  // brief visual feedback
  const btn = event.target;
  btn.textContent = 'Saved ✓';
  setTimeout(() => btn.textContent = 'Save', 1500);
}

function revealTr(secIdx, itemIdx) {
  const key = AL+'_'+secIdx+'_'+itemIdx;
  ST.checked['tr_reveal_'+key] = true;
  const el = document.getElementById(`trmodel_${secIdx}_${itemIdx}`);
  el.classList.add('show');
}

function rLog(sec) {
  let html = '';
  sec.prompts.forEach((prompt, i) => {
    const sKey = AL+'_'+AS+'_'+i;
    const savedVal = ST.logs[sKey] || '';
    const isSaved = ST.checked['log_saved_'+sKey];
    html += `<div class="log-item">
      <div class="log-num">Reflection ${i+1}</div>
      <div class="log-prompt">${esc(prompt)}</div>
      <textarea class="log-textarea" id="log_${AS}_${i}" placeholder="Write your reflection here…">${esc(savedVal)}</textarea>
      <div>
        <button class="log-save-btn" onclick="saveLog(${AS},${i})">Save</button>
        <span class="log-saved${isSaved?' show':''}" id="logsaved_${AS}_${i}">✓ Saved</span>
      </div>
    </div>`;
  });
  const rubKey = sec.rubricKey || 'log';
  html += `<button class="log-save-all-btn" onclick="saveLogAll(${AS})">Save all reflections</button>`;
  html += `<button class="rubric-toggle" onclick="togRub('rub_log_${AS}')">Show rubric</button>`;
  html += `<div class="rubric-box" id="rub_log_${AS}">${rubricHTML(RUBRICS[AL][rubKey])}</div>`;
  return html;
}

function saveLog(secIdx, promptIdx) {
  const sKey = AL+'_'+secIdx+'_'+promptIdx;
  ST.logs[sKey] = document.getElementById(`log_${secIdx}_${promptIdx}`).value;
  ST.checked['log_saved_'+sKey] = true;
  const span = document.getElementById(`logsaved_${secIdx}_${promptIdx}`);
  if (span) span.classList.add('show');
}

function saveLogAll(secIdx) {
  const sec = LEVELS[AL].sections[secIdx];
  sec.prompts.forEach((_, i) => saveLog(secIdx, i));
}

// Helpers
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function badge(text, color) {
  return `<span class="badge" style="background:${color}22;color:${color}">${esc(text)}</span>`;
}

function rubricHTML(items) {
  if (!items) return '<p style="padding:12px;font-size:.8rem;color:#888">No rubric available.</p>';
  return items.map(r => `
    <div class="rubric-row">
      <div>
        <div class="rubric-crit">${esc(r.criterion)}</div>
        <div class="rubric-desc">${esc(r.desc)}</div>
      </div>
      <span class="rubric-max">${r.max} pt${r.max>1?'s':''}</span>
    </div>`).join('');
}

function togRub(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('show');
  const btn = el.previousElementSibling;
  if (btn) btn.textContent = el.classList.contains('show') ? 'Hide rubric' : 'Show rubric';
}

function progHTML(correct, total) {
  const pct = total ? Math.round(correct/total*100) : 0;
  return `<div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>`;
}

function scoreBadge(score, max) {
  const pct = max ? score/max : 0;
  const cls = pct >= 0.8 ? 'good' : pct >= 0.5 ? 'mid' : 'low';
  return `<span class="score-badge ${cls}">${Math.round(pct*100)}%</span>`;
}

function handleDownload() {
  const lv = LEVELS[AL];
  const now = new Date();
  let txt = `HUONG STELLA PARADIGM — Daily Drills Day 5\n`;
  txt += `Level: ${lv.label} | Theme: ${lv.theme}\n`;
  txt += `Downloaded: ${now.toISOString()}\n`;
  txt += '='.repeat(60) + '\n\n';

  lv.sections.forEach((sec, si) => {
    txt += `SECTION ${si+1}: ${sec.title}\n` + '-'.repeat(40) + '\n';
    if (sec.type === 'spot') {
      sec.items.forEach((item, ii) => {
        const sKey = AL+'_'+si+'_'+ii;
        const choice = ST.choices[sKey] || '(not answered)';
        txt += `Item ${ii+1}: ${item.sentence}\n`;
        txt += `Your choice: ${choice === 'correct_b' ? 'Correct — '+item.correctWord : choice === 'wrong_a' ? 'Keep as is (incorrect)' : choice}\n`;
        txt += `Answer: ${item.correctWord} | Rule: ${item.rule}\n\n`;
      });
    } else if (sec.type === 'fill') {
      sec.items.forEach((item, ii) => {
        const sKey = AL+'_'+si+'_'+ii;
        const val = ST.inputs[sKey] || '(blank)';
        const status = ST.checked[sKey] || 'unchecked';
        txt += `Item ${ii+1}: ${item.template}\n`;
        txt += `Your answer: ${val} [${status}] | Correct: ${item.answer}\n`;
        txt += `Explanation: ${item.explanation}\n\n`;
      });
    } else if (sec.type === 'transform') {
      sec.items.forEach((item, ii) => {
        const key = AL+'_'+si+'_'+ii;
        const val = ST.inputs['tr_'+key] || '(blank)';
        txt += `Item ${ii+1}: ${item.spoken}\n`;
        txt += `Your version: ${val}\nModel: ${item.answer}\n\n`;
      });
    } else if (sec.type === 'log') {
      sec.prompts.forEach((prompt, ii) => {
        const sKey = AL+'_'+si+'_'+ii;
        const val = ST.logs[sKey] || '(not written)';
        txt += `Reflection ${ii+1}: ${prompt}\nYour response: ${val}\n\n`;
      });
    }
    txt += '\n';
  });

  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `HuongStella_DailyDrill_Day5_${AL}_${now.toISOString().slice(0,10)}.txt`;
  a.click();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
