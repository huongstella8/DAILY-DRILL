<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Drills 13</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--lc:#2D6A4F;--ll:#D8F3DC}
body{font-family:'Inter',sans-serif;background:#F4F2EF;color:#1a1a1a;min-height:100vh}
header{background:#111;color:#fff;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.brand{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;opacity:.55}
.header-center{text-align:center}
.day-label{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;opacity:.6;margin-bottom:3px}
.day-title{font-size:20px;font-weight:800;letter-spacing:-.3px}
.header-right{font-size:11px;opacity:.45;text-align:right}
.lv-tabs{display:flex;gap:6px;padding:16px 24px 0;flex-wrap:wrap}
.lv-tab{padding:9px 18px;border-radius:8px 8px 0 0;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#e0deda;color:#555;transition:all .2s}
.lv-tab.active{color:#fff;background:var(--lc)}
.lv-tab:hover:not(.active){background:#ccc}
.main{max-width:860px;margin:0 auto;padding:0 16px 60px}
.level-card{background:#fff;border-radius:0 12px 12px 12px;box-shadow:0 2px 12px rgba(0,0,0,.07);padding:28px;margin-bottom:20px}
.lc-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding-bottom:18px;border-bottom:2px solid var(--ll)}
.lc-badge{background:var(--lc);color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px;padding:4px 10px;border-radius:20px;text-transform:uppercase}
.lc-theme{font-size:19px;font-weight:800;color:var(--lc);margin:6px 0 3px}
.lc-tagline{font-size:13px;color:#666;font-style:italic}
.lc-meta{display:flex;gap:16px;font-size:12px;color:#888;margin-top:8px}
.lc-meta span{display:flex;align-items:center;gap:4px}
.goal-box{background:var(--ll);border-left:4px solid var(--lc);border-radius:6px;padding:12px 16px;margin-bottom:20px;font-size:13.5px;line-height:1.6}
.goal-box strong{color:var(--lc);font-weight:700}
.sec-nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.sec-btn{padding:7px 15px;border-radius:20px;border:2px solid var(--lc);background:#fff;color:var(--lc);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.sec-btn.active,.sec-btn:hover{background:var(--lc);color:#fff}
.section-wrap{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Theory */
.theory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:20px}
.theory-card{border-radius:10px;padding:16px;border:1px solid #e5e0da}
.tc-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.tc-badge{display:inline-block;background:#111;color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.tc-ex{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(0,0,0,.05);padding:6px 8px;border-radius:6px;margin-bottom:8px;line-height:1.5}
.tc-rule{font-size:12.5px;color:#444;line-height:1.5}
/* Theory2 */
.t2-group{border:1px solid #e5e0da;border-radius:10px;padding:16px;margin-bottom:14px}
.t2-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.t2-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.t2-chip{padding:4px 11px;border-radius:16px;font-size:12px;font-weight:600;color:#fff}
.t2-mem{font-size:12.5px;color:#555;margin-bottom:7px;font-style:italic}
.t2-ex{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:#F4F2EF;padding:8px 10px;border-radius:6px;line-height:1.5}
/* Theory3 */
.t3-pair{background:#F4F2EF;border-radius:10px;padding:14px;margin-bottom:14px}
.t3-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.t3-box{padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.5}
.t3-spoken{background:#fff3cd;border-left:3px solid #e6a817}
.t3-acad{background:#d4edda;border-left:3px solid #28a745}
.t3-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;opacity:.7}
.t3-change{font-size:12px;color:#555;background:#fff;padding:7px 10px;border-radius:6px;border:1px dashed #ccc}
.t3-insight{background:var(--ll);border-left:4px solid var(--lc);border-radius:8px;padding:14px;margin-top:16px;font-size:13px;line-height:1.6}
/* Theory4 */
.t4-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.t4-card{border-radius:10px;padding:16px;border:1px solid #e5e0da}
.t4-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.t4-desc{font-size:12.5px;color:#444;line-height:1.5;margin-bottom:10px}
.t4-fix{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:rgba(0,0,0,.05);padding:8px;border-radius:6px;line-height:1.6}
/* Spot */
.spot-item{border:2px solid #e5e0da;border-radius:10px;padding:16px;margin-bottom:14px;transition:border-color .2s}
.spot-item.correct{border-color:#28a745;background:#f0fff4}
.spot-item.incorrect{border-color:#dc3545;background:#fff5f5}
.spot-sentence{font-size:15px;line-height:1.7;margin-bottom:12px}
.spot-underline{text-decoration:underline;text-decoration-color:#e6a817;text-decoration-thickness:2px;font-weight:600}
.spot-choices{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.spot-choice{padding:7px 16px;border-radius:20px;border:2px solid #ddd;background:#fff;font-size:13px;cursor:pointer;transition:all .15s;font-weight:500}
.spot-choice:hover{border-color:var(--lc);background:var(--ll)}
.spot-choice.selected-correct{border-color:#28a745;background:#d4edda;color:#155724}
.spot-choice.selected-wrong{border-color:#dc3545;background:#f8d7da;color:#721c24}
.spot-choice.reveal-correct{border-color:#28a745;background:#d4edda;color:#155724}
.spot-feedback{margin-top:10px;font-size:13px;line-height:1.5;display:none}
.spot-feedback.show{display:block}
.spot-rule{background:#fff3cd;border-left:3px solid #e6a817;padding:8px 12px;border-radius:6px;margin-bottom:6px}
.spot-tip{background:#cce5ff;border-left:3px solid #004085;padding:8px 12px;border-radius:6px;font-style:italic}
.spot-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
/* Fill */
.fill-item{border:1px solid #e5e0da;border-radius:10px;padding:16px;margin-bottom:14px}
.fill-template{font-size:15px;line-height:1.7;margin-bottom:8px;font-family:'JetBrains Mono',monospace}
.fill-base{font-size:12px;color:#888;margin-bottom:10px}
.fill-base span{background:#e9e5e0;padding:2px 8px;border-radius:4px;font-weight:600;color:#555;margin-right:4px}
.fill-input-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fill-input{border:2px solid #ddd;border-radius:8px;padding:8px 14px;font-size:14px;font-family:'Inter',sans-serif;outline:none;min-width:160px;transition:border-color .2s}
.fill-input:focus{border-color:var(--lc)}
.fill-input.correct{border-color:#28a745;background:#f0fff4}
.fill-input.incorrect{border-color:#dc3545;background:#fff5f5}
.fill-fb{margin-top:10px;font-size:13px;display:none;line-height:1.5}
.fill-fb.show{display:block}
.fill-correct-ans{color:#155724;font-weight:700;margin-bottom:4px}
.fill-exp{color:#444}
/* Transform */
.tr-item{border:1px solid #e5e0da;border-radius:10px;padding:18px;margin-bottom:14px}
.tr-spoken{background:#fff3cd;border-left:3px solid #e6a817;padding:10px 14px;border-radius:6px;margin-bottom:10px;font-size:14px;line-height:1.6}
.tr-spoken-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#856404;margin-bottom:3px}
.tr-hint{font-size:12px;color:#888;margin-bottom:10px;font-style:italic}
.tr-textarea{width:100%;border:2px solid #ddd;border-radius:8px;padding:10px 14px;font-size:14px;font-family:'Inter',sans-serif;resize:vertical;min-height:80px;outline:none;transition:border-color .2s}
.tr-textarea:focus{border-color:var(--lc)}
.tr-fb{margin-top:12px;display:none}
.tr-fb.show{display:block}
.tr-model{background:#d4edda;border-left:3px solid #28a745;padding:10px 14px;border-radius:6px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6}
.tr-model-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#155724;margin-bottom:3px}
.tr-key{background:#e8d5f5;border-left:3px solid #5A1A8A;padding:8px 12px;border-radius:6px;font-size:12.5px;color:#3d0d5c;margin-bottom:6px}
.tr-principle{background:#cce5ff;border-left:3px solid #004085;padding:8px 12px;border-radius:6px;font-size:12.5px;color:#002752;font-style:italic}
/* Log */
.log-item{margin-bottom:16px}
.log-prompt{font-size:13.5px;font-weight:600;color:var(--lc);margin-bottom:8px;line-height:1.5}
.log-textarea{width:100%;border:2px solid #ddd;border-radius:8px;padding:10px 14px;font-size:13.5px;font-family:'Inter',sans-serif;resize:vertical;min-height:90px;outline:none;transition:border-color .2s;line-height:1.6}
.log-textarea:focus{border-color:var(--lc)}
/* Buttons */
.btn{padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--lc);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-outline{background:#fff;border:2px solid var(--lc);color:var(--lc)}
.btn-outline:hover{background:var(--ll)}
.btn-sm{padding:6px 14px;font-size:12px}
/* Progress */
.prog-bar-wrap{background:#e9e5e0;border-radius:20px;height:6px;margin-top:12px;overflow:hidden}
.prog-bar{height:100%;background:var(--lc);border-radius:20px;transition:width .4s}
.score-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700;margin-left:8px}
.score-hi{background:#d4edda;color:#155724}
.score-mid{background:#fff3cd;color:#856404}
.score-lo{background:#f8d7da;color:#721c24}
/* Rubric */
.rub-toggle{font-size:12px;color:var(--lc);cursor:pointer;font-weight:600;margin-top:10px;display:inline-block;text-decoration:underline}
.rub-panel{display:none;margin-top:10px;border:1px solid #e5e0da;border-radius:8px;overflow:hidden}
.rub-panel.open{display:block}
.rub-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:8px 12px;font-size:12.5px;border-bottom:1px solid #f0ece6}
.rub-row:last-child{border-bottom:none}
.rub-row:nth-child(even){background:#faf8f5}
.rub-max{color:#888;font-size:11px}
.section-title{font-size:17px;font-weight:800;color:var(--lc);margin-bottom:4px}
.section-subtitle{font-size:13px;color:#888;margin-bottom:18px}
.download-bar{position:fixed;bottom:0;left:0;right:0;background:#111;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100}
.dl-info{color:#ccc;font-size:13px}
.dl-info strong{color:#fff}
@media(max-width:600px){.t3-row{grid-template-columns:1fr}.lv-tabs{padding:12px 12px 0}.main{padding:0 8px 80px}.theory-grid,.t4-grid{grid-template-columns:1fr}}
</style>
</head>

const LEVELS = {
  a2b1: {
    label:"A2–B1", color:"#2D6A4F", light:"#D8F3DC",

      { id:"transform", label:"Transform", type:"transform", rubricKey:"transform",
        title:"Transform: Imprecise → Epistemically Calibrated", subtitle:"Rewrite each sentence to achieve precise epistemic stance and formal academic voice.",
        items:[
          { spoken:"It seems like the results show something important about how people make decisions.",
            hint:"evidently illuminate / decision-making processes / significant implications / noun phrase density",
            answer:"The results evidently illuminate key dimensions of human decision-making, with significant implications for behavioural economics and policy design.",
            keyChange:"'Seems like … show something important' → 'evidently illuminate' (evidential adverb + precise verb); vague 'how people make decisions' → nominalised 'human decision-making'; added implication clause increases argumentative weight.",
            principle:"Replace vague hedged phrases with evidential stance adverbs (evidently, demonstrably) paired with precise nominalised noun phrases. Each clause should advance the argument, not merely gesture toward it." },
          { spoken:"Even though the critics say it doesn't work, I think it probably does in certain situations.",
            hint:"notwithstanding / efficacy / may well / context-dependent / impersonal",
            answer:"Notwithstanding critical assessments of its efficacy, the approach may well prove effective within specific contextual configurations.",
            keyChange:"'Even though critics say' → 'notwithstanding critical assessments of its efficacy' (formal concession + nominalisation); 'I think probably' → 'may well' (impersonal epistemic modal, signals likelihood); 'in certain situations' → 'within specific contextual configurations'.",
            principle:"Replace first-person hedges with impersonal modal constructions. 'May well' signals calibrated likelihood (stronger than 'might', weaker than 'will'). 'Notwithstanding' introduces formal concession without subordination." },
          { spoken:"Scientists now know more about this than they used to, but there are still things they don't understand.",
            hint:"has been substantially advanced / hitherto / lacunae / nonetheless / nominalise",
            answer:"Scientific understanding of this phenomenon has been substantially advanced in recent decades; nonetheless, significant lacunae remain in the extant literature.",
            keyChange:"'Know more than they used to' → 'has been substantially advanced' (passive nominalisation of knowledge growth); 'things they don't understand' → 'significant lacunae' (field-specific vocabulary); 'nonetheless' as a formal discourse adverb replacing informal 'but'.",
            principle:"Nominalise epistemic states ('knowing more' → 'advancement of understanding'). Replace vague expressions with field-specific vocabulary. Use formal discourse adverbs (nonetheless, hitherto) to signal argumentative structure at the macro level." }
        ]
      },
      { id:"log", label:"Error Log", type:"log", rubricKey:"log",
        title:"Error Log & Reflection",
        prompts:[
          "Identify one overclaimed or underclaimed statement from your recent academic writing. Rewrite it with precise epistemic marking — choose from: arguably, evidently, presumably, conceivably. Justify your choice in one sentence.",
          "Write three sentences, each demonstrating a different stance adverb category: (1) evidential (demonstrably / empirically / theoretically), (2) epistemic (arguably / presumably / conceivably), (3) attitudinal (tellingly / paradoxically / worryingly).",
          "Audit one paragraph you have written: underline every discourse adverb (however, therefore, furthermore, etc.). Are any repeated? Are any logically inconsistent with the surrounding argument? Rewrite at least one to improve discourse architecture."
        ]
      }
    ]
  }
};

let AL = 'a2b1', AS = 0;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function badge(text, cls){ return `<span class="tc-badge">${esc(text)}</span>`; }

function rubricHTML(rubricKey){
  const rules = RUBRICS[AL][rubricKey];
  if(!rules) return '';
  const rows = rules.map(r=>`<div class="rub-row"><span>${esc(r.criterion)}</span><span class="rub-max">/${r.max}</span><span style="color:#888;font-size:11px">${esc(r.desc)}</span></div>`).join('');
  return `<span class="rub-toggle" onclick="togRub(this)">▸ View rubric</span><div class="rub-panel">${rows}</div>`;
}

function togRub(el){ const p=el.nextElementSibling; p.classList.toggle('open'); el.textContent=p.classList.contains('open')?'▾ Hide rubric':'▸ View rubric'; }

function progHTML(id, done, total){
  const pct = total>0?Math.round(done/total*100):0;
  return `<div style="margin-top:10px;font-size:12px;color:#888">${done}/${total} completed <span id="sb_${id}"></span><div class="prog-bar-wrap"><div class="prog-bar" id="pb_${id}" style="width:${pct}%"></div></div></div>`;
}

function updProg(id, done, total){
  const pb=document.getElementById('pb_'+id), sb=document.getElementById('sb_'+id);
  if(!pb||!sb) return;
  const pct=total>0?Math.round(done/total*100):0;
  pb.style.width=pct+'%';
  sb.innerHTML=scoreBadge(done,total);
}

function scoreBadge(done,total){
  if(!total||!done) return '';
  const pct=done/total;
  const cls=pct>=.8?'score-hi':pct>=.5?'score-mid':'score-lo';
  return `<span class="score-badge ${cls}">${done}/${total}</span>`;
}

function switchLv(k){ AL=k; AS=0; buildLvTabs(); applyLevel(); }

function applyLevel(){
  const lv=LEVELS[AL];
  document.documentElement.style.setProperty('--lc',lv.color);
  document.documentElement.style.setProperty('--ll',lv.light);

  const card=document.getElementById('lvCard');
  card.innerHTML=`
    <div class="level-card">
      <div class="lc-header">
        <div>
          <div class="lc-badge">${esc(lv.label)}</div>

      </div>

      <div class="sec-nav" id="secNav"></div>
      <div id="secWrap"></div>
    </div>`;
  buildSecNav();
  navSec(AS);
}

function buildSecNav(){
  const lv=LEVELS[AL];
  const nav=document.getElementById('secNav');
  nav.innerHTML=lv.sections.map((s,i)=>`<button class="sec-btn${i===AS?' active':''}" onclick="navSec(${i})">${esc(s.label)}</button>`).join('');
}

function navSec(i){
  AS=i;
  const btns=document.querySelectorAll('.sec-btn');
  btns.forEach((b,j)=>b.classList.toggle('active',j===i));
  renderSec(LEVELS[AL].sections[i]);
}

function renderSec(sec){
  const wrap=document.getElementById('secWrap');
  wrap.innerHTML='';
  const div=document.createElement('div');
  div.className='section-wrap';
  switch(sec.type){
    case 'theory':   div.innerHTML=rTheory(sec); break;
    case 'theory2':  div.innerHTML=rTheory2(sec); break;
    case 'theory3':  div.innerHTML=rTheory3(sec); break;
    case 'theory4':  div.innerHTML=rTheory4(sec); break;
    case 'spot':     div.innerHTML=rSpot(sec); break;
    case 'fill':     div.innerHTML=rFill(sec); break;
    case 'transform':div.innerHTML=rTransform(sec); break;
    case 'log':      div.innerHTML=rLog(sec); break;
  }
  wrap.appendChild(div);
}

// ─── RENDERERS ───────────────────────────────────────────────────────────────
function rTheory(sec){
  const cards=sec.cards.map(c=>`
    <div class="theory-card" style="border-top:3px solid ${c.color}">

    <div class="section-subtitle">${esc(sec.subtitle)}</div>

}

function rTheory2(sec){
  const groups=sec.groups.map(g=>`
    <div class="t2-group" style="border-top:3px solid ${g.color}">

}

  const pairs=sec.pairs.map(p=>`

      <div class="t3-row">
        <div class="t3-box t3-spoken"><div class="t3-lbl">Spoken / Informal</div>${esc(p.spoken)}</div>
        <div class="t3-box t3-acad"><div class="t3-lbl">Academic</div>${esc(p.academic)}</div>
      </div>
      <div class="t3-change">🔄 ${esc(p.change)}</div>

}

function rTheory4(sec){
  const cards=sec.cards.map(c=>`
    <div class="t4-card" style="border-top:3px solid ${c.color}">
      <div class="t4-label" style="color:${c.color}">${esc(c.label)}</div>
      <div class="t4-desc">${esc(c.desc)}</div>
      <div class="t4-fix">${esc(c.fix)}</div>
    </div>`).join('');
  return `<div class="section-title">${esc(sec.title)}</div>
    <div class="section-subtitle">${esc(sec.subtitle)}</div>
    <div class="t4-grid">${cards}</div>`;
}

function rSpot(sec){
  const key=AL+'_spot';
  const items=sec.items.map((it,i)=>`
    <div class="spot-item" id="sp_${i}">
      <div class="spot-sentence">${buildSpotSentence(it)}</div>
      <div class="spot-choices">
        <button class="spot-choice" onclick="spotPick(${i},'keep')" id="spc_${i}_keep">✓ Sentence is correct</button>
        <button class="spot-choice" onclick="spotPick(${i},'error')" id="spc_${i}_error">✗ Contains an error → ${esc(it.correctWord)}</button>
      </div>
      <div class="spot-feedback" id="spf_${i}">
        <div class="spot-rule">📖 <strong>Rule:</strong> ${esc(it.rule)}</div>
        <div class="spot-tip" style="margin-top:6px">💡 <strong>Tip:</strong> ${esc(it.tip)}</div>
        <div style="margin-top:8px;font-size:12.5px;color:#555"><strong>Error type:</strong> ${esc(it.wrongType)} → <strong>Correction:</strong> ${esc(it.correctType)}</div>
      </div>
    </div>`).join('');
  const total=sec.items.length;
  return `<div class="section-title">${esc(sec.title)}</div>
    <div class="section-subtitle">${esc(sec.subtitle)}</div>
    ${items}
    <div class="spot-actions">
      <button class="btn btn-primary" onclick="calcSpot('${sec.id}',${total})">Check All</button>
      <button class="btn btn-outline" onclick="resetSpot(${total})">Reset</button>
    </div>
    ${progHTML(sec.id,0,total)}
    ${rubricHTML(sec.rubricKey)}`;
}

function buildSpotSentence(it){
  const s=esc(it.sentence);
  const uw=esc(it.underlined);
  return s.replace(uw,`<span class="spot-underline">${uw}</span>`);
}

function spotPick(i, choice){
  ST.choices[AL+'_sp_'+i]=choice;
  ['keep','error'].forEach(c=>{
    const b=document.getElementById(`spc_${i}_${c}`);
    if(b) b.classList.remove('selected-correct','selected-wrong');
  });
  const btn=document.getElementById(`spc_${i}_${choice}`);
  if(btn) btn.classList.add('selected-correct');
}

function calcSpot(secId, total){
  let done=0;
  for(let i=0;i<total;i++){
    const chosen=ST.choices[AL+'_sp_'+i];
    const item=document.getElementById('sp_'+i);
    const fb=document.getElementById('spf_'+i);
    if(!item) continue;
    // All sentences contain errors
    const correct = (chosen==='error');
    item.classList.remove('correct','incorrect');
    item.classList.add(correct?'correct':'incorrect');
    ['keep','error'].forEach(c=>{
      const b=document.getElementById(`spc_${i}_${c}`);
      if(b) b.classList.remove('selected-correct','selected-wrong','reveal-correct');
    });
    const errBtn=document.getElementById(`spc_${i}_error`);
    if(errBtn) errBtn.classList.add('reveal-correct');
    if(chosen){
      const chosenBtn=document.getElementById(`spc_${i}_${chosen}`);
      if(chosenBtn && !correct) chosenBtn.classList.add('selected-wrong');
    }
    if(fb){ fb.classList.add('show'); }
    if(correct) done++;
  }
  updProg(secId, done, total);
}

function resetSpot(total){
  for(let i=0;i<total;i++){
    ST.choices[AL+'_sp_'+i]=null;
    const item=document.getElementById('sp_'+i);
    if(item) item.classList.remove('correct','incorrect');
    ['keep','error'].forEach(c=>{
      const b=document.getElementById(`spc_${i}_${c}`);
      if(b) b.classList.remove('selected-correct','selected-wrong','reveal-correct');
    });
    const fb=document.getElementById('spf_'+i);
    if(fb) fb.classList.remove('show');
  }
}

function rFill(sec){
  const items=sec.items.map((it,i)=>`
    <div class="fill-item">
      <div class="fill-template">${esc(it.template)}</div>
      <div class="fill-base">Cue: <span>${esc(it.baseWord)}</span></div>
      <div class="fill-input-row">
        <input class="fill-input" id="fi_${i}" type="text" placeholder="${esc(it.hint)}" oninput="saveFill(${i})">
        <button class="btn btn-primary btn-sm" onclick="fillChk(${i},'${esc(it.answer)}','${esc(it.explanation)}')">Check</button>
      </div>
      <div class="fill-fb" id="ff_${i}">
        <div class="fill-correct-ans">✓ Model answer: ${esc(it.answer)}</div>
        <div class="fill-exp">${esc(it.explanation)}</div>
      </div>
    </div>`).join('');
  const total=sec.items.length;
  return `<div class="section-title">${esc(sec.title)}</div>
    <div class="section-subtitle">${esc(sec.subtitle)}</div>
    ${items}
    <div style="margin-top:10px">
      <button class="btn btn-primary" onclick="calcFill('${sec.id}',${total})">Check All</button>
      <button class="btn btn-outline" onclick="resetFill(${total})" style="margin-left:8px">Reset</button>
    </div>
    ${progHTML(sec.id,0,total)}
    ${rubricHTML(sec.rubricKey)}`;
}

function saveFill(i){
  const el=document.getElementById('fi_'+i);
  if(el) ST.inputs[AL+'_fi_'+i]=el.value;
}

function fillChk(i, ans, exp){
  const el=document.getElementById('fi_'+i);
  const fb=document.getElementById('ff_'+i);
  if(!el||!fb) return;
  const val=el.value.trim().toLowerCase();
  const correct=ans.toLowerCase().split('/').map(a=>a.trim()).some(a=>val===a||val.replace(/\s+/g,' ')===a);
  el.classList.remove('correct','incorrect');
  el.classList.add(correct?'correct':'incorrect');
  fb.classList.add('show');
  ST.checked[AL+'_fi_'+i]=correct;
}

function calcFill(secId, total){
  let done=0;
  const lv=LEVELS[AL];
  const sec=lv.sections.find(s=>s.id===secId);
  if(!sec) return;
  sec.items.forEach((it,i)=>{
    fillChk(i, it.answer, it.explanation);
    if(ST.checked[AL+'_fi_'+i]) done++;
  });
  updProg(secId, done, total);
}

function resetFill(total){
  for(let i=0;i<total;i++){
    const el=document.getElementById('fi_'+i);
    if(el){ el.value=''; el.classList.remove('correct','incorrect'); }
    const fb=document.getElementById('ff_'+i);
    if(fb) fb.classList.remove('show');
    ST.checked[AL+'_fi_'+i]=null;
  }
}

function rTransform(sec){
  const items=sec.items.map((it,i)=>`
    <div class="tr-item">
      <div class="tr-spoken"><div class="tr-spoken-lbl">Spoken / Informal</div>${esc(it.spoken)}</div>
      <div class="tr-hint">💡 Hint: ${esc(it.hint)}</div>
      <textarea class="tr-textarea" id="tr_${i}" placeholder="Write your academic version here…" oninput="saveTr(${i})"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="revealTr(${i})">Reveal Model Answer</button>
      </div>
      <div class="tr-fb" id="trf_${i}">
        <div class="tr-model"><div class="tr-model-lbl">Model Answer</div>${esc(it.answer)}</div>
        <div class="tr-key">🔄 <strong>Key changes:</strong> ${esc(it.keyChange)}</div>
        <div class="tr-principle">📐 <strong>Principle:</strong> ${esc(it.principle)}</div>
      </div>
    </div>`).join('');
  return `<div class="section-title">${esc(sec.title)}</div>
    <div class="section-subtitle">${esc(sec.subtitle)}</div>
    ${items}
    ${rubricHTML(sec.rubricKey)}`;
}

function saveTr(i){
  const el=document.getElementById('tr_'+i);
  if(el) ST.inputs[AL+'_tr_'+i]=el.value;
}

function revealTr(i){
  const fb=document.getElementById('trf_'+i);
  if(fb) fb.classList.add('show');
  const el=document.getElementById('tr_'+i);
  if(el) ST.inputs[AL+'_tr_'+i]=el.value;
}

function rLog(sec){
  const items=sec.prompts.map((p,i)=>`
    <div class="log-item">
      <div class="log-prompt">${i+1}. ${esc(p)}</div>
      <textarea class="log-textarea" id="log_${i}" placeholder="Write your response here…" oninput="saveLog(${i})"></textarea>
    </div>`).join('');
  return `<div class="section-title">${esc(sec.title)}</div>
    ${items}
    <button class="btn btn-primary" onclick="saveLogAll(${sec.prompts.length})">Save Reflection</button>
    ${rubricHTML(sec.rubricKey)}`;
}

function saveLog(i){
  const el=document.getElementById('log_'+i);
  if(el) ST.logs[AL+'_log_'+i]=el.value;
}

function saveLogAll(n){
  for(let i=0;i<n;i++){
    const el=document.getElementById('log_'+i);
    if(el) ST.logs[AL+'_log_'+i]=el.value;
  }
  alert('Reflection saved! Download your report to keep a full record.');
}

// ─── DOWNLOAD ────────────────────────────────────────────────────────────────
function handleDownload(){
  const lv=LEVELS[AL];
  const now=new Date();
  let txt=`HUONG STELLA PARADIGM — Daily Drills Day 13\n`;
  txt+=`Level: ${lv.label} | Theme: ${lv.theme}\n`;
  txt+=`Date: ${now.toISOString().slice(0,10)}\n`;
  txt+='='.repeat(60)+'\n\n';

  txt+='SPOT-THE-ERROR RESPONSES\n'+'-'.repeat(40)+'\n';
  const spotSec=lv.sections.find(s=>s.type==='spot');
  if(spotSec){
    spotSec.items.forEach((it,i)=>{
      const ch=ST.choices[AL+'_sp_'+i]||'(no answer)';
      txt+=`Q${i+1}: "${it.sentence}"\n  Your answer: ${ch}\n  Correct: error → ${it.correctWord}\n  Rule: ${it.rule}\n\n`;
    });
  }

  txt+='\nFILL-IN-THE-BLANK RESPONSES\n'+'-'.repeat(40)+'\n';
  const fillSec=lv.sections.find(s=>s.type==='fill');
  if(fillSec){
    fillSec.items.forEach((it,i)=>{
      const val=ST.inputs[AL+'_fi_'+i]||'(blank)';
      txt+=`Q${i+1}: ${it.template}\n  Your answer: ${val}\n  Model: ${it.answer}\n  ${it.explanation}\n\n`;
    });
  }

  if(AL==='b2c1'||AL==='c1c2'){
    txt+='\nTRANSFORM RESPONSES\n'+'-'.repeat(40)+'\n';
    const trSec=lv.sections.find(s=>s.type==='transform');
    if(trSec){
      trSec.items.forEach((it,i)=>{
        const val=ST.inputs[AL+'_tr_'+i]||'(blank)';
        txt+=`Q${i+1}: "${it.spoken}"\n  Your version: ${val}\n  Model: ${it.answer}\n  Key changes: ${it.keyChange}\n\n`;
      });
    }
  }

  txt+='\nERROR LOG / REFLECTION\n'+'-'.repeat(40)+'\n';
  const logSec=lv.sections.find(s=>s.type==='log');
  if(logSec){
    logSec.prompts.forEach((p,i)=>{
      const val=ST.logs[AL+'_log_'+i]||'(blank)';
      txt+=`Prompt ${i+1}: ${p}\n  Response: ${val}\n\n`;
    });
  }

  txt+='\n'+'='.repeat(60)+'\nEnd of Daily Drills Day 13 Report\n';

  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`HuongStella_DailyDrill_Day13_${AL}_${now.toISOString().slice(0,10)}.txt`;
  a.click();
}
