function renderSec(secIdx){
  const sec=LEVELS[AL].sections[secIdx];
  AS=secIdx;
  let html=`<div class="sec-title">${esc(sec.title)}</div>`;
  if(sec.type==='theory')html+=`<div class="sec-sub">Study these cards before attempting the exercises.</div>`+rTheory(sec);
  else if(sec.type==='theory2')html+=`<div class="sec-sub">Review the verb groups and their memory rules.</div>`+rTheory2(sec);
  else if(sec.type==='theory3')html+=`<div class="sec-sub">Study the nominalisation examples, then read the key insight.</div>`+rTheory3(sec);
  else if(sec.type==='theory4')html+=`<div class="sec-sub">Study each strategy in full — the detail here is the practice.</div>`+rTheory4(sec);
  else if(sec.type==='spot')html+=`<div class="sec-sub">Each sentence contains exactly one error. Choose the correct replacement.</div>`+rSpot(sec,secIdx);
  else if(sec.type==='fill')html+=`<div class="sec-sub">Use the base word given to supply the correct form.</div>`+rFill(sec,secIdx);
  else if(sec.type==='transform')html+=`<div class="sec-sub">Rewrite each sentence using the hint. Then reveal the model answer.</div>`+rTransform(sec,secIdx);
  else if(sec.type==='log')html+=`<div class="sec-sub">Reflect deeply. Your notes are saved for download.</div>`+rLog(sec,secIdx);
  document.getElementById('content').innerHTML=html;
  document.querySelectorAll('.sec-btn').forEach((b,i)=>b.classList.toggle('active',i===secIdx));
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── INTERACTIONS ───────────────────────────────────────────────────────
function spotPick(cid,chosen,correct){
  if(document.getElementById('spot-wrap-'+cid).querySelector('.locked'))return;
  document.querySelectorAll(`[id^="sc-${cid}-"]`).forEach(b=>{b.classList.remove('selected','correct','wrong');b.classList.add('locked')});
  const isOk=chosen===correct;
  const cb=document.getElementById('sc-'+cid+'-'+chosen);
  if(cb)cb.classList.add(isOk?'correct':'wrong');
  if(!isOk){const rb=document.getElementById('sc-'+cid+'-'+correct);if(rb)rb.classList.add('correct')}
  ST.choices[cid]=isOk;
  const sec=LEVELS[AL].sections[AS];
  const it=sec.items[parseInt(cid.split('_').pop())];
  const fb=document.getElementById('sf-'+cid);
  fb.className='spot-feedback show '+(isOk?'ok':'err');
  fb.innerHTML=`<strong>${isOk?'✓ Correct!':'✗ Incorrect — the correct answer is: '+esc(correct)}</strong>
  <div class="fb-rule">📌 <em>${esc(it.wrongType)}</em> → <em>${esc(it.correctType)}</em><br>${esc(it.rule)}</div>
  <div class="fb-tip">💡 Tip: ${esc(it.tip)}</div>`;
}
function calcSpot(key,total,maxScore){
  let done=0,correct=0;
  for(let i=0;i<total;i++){const cid=`${key}_${i}`;if(ST.choices[cid]!==undefined){done++;if(ST.choices[cid])correct++}}
  updProg(parseInt(key.split('_').pop()),done,total);
  const sd=document.getElementById('spot-score-'+key);
  sd.style.display='block';
  sd.innerHTML=`Score: ${scoreBadge(correct,total)} | Completed: ${done}/${total}`;
}
function fillChk(cid,answer,explanation){
  const inp=document.getElementById('fi-'+cid);
  const val=(inp.value||'').trim().toLowerCase();
  const alts=answer.toLowerCase().split('/').map(a=>a.trim());
  const isOk=alts.some(a=>val===a);
  inp.classList.remove('correct','wrong');inp.classList.add(isOk?'correct':'wrong');
  document.getElementById('ff-'+cid).className='fill-feedback show '+(isOk?'ok':'err');
  document.getElementById('ff-'+cid).innerHTML=`<strong>${isOk?'✓ Correct!':'✗ The answer is: <em>'+esc(answer)+'</em>'}</strong><br>${esc(explanation)}`;
  ST.checked[cid]=isOk;
}
function calcFill(key,total,maxScore){
  let done=0,correct=0;
  for(let i=0;i<total;i++){const cid=`${key}_${i}`;const inp=document.getElementById('fi-'+cid);if(inp&&inp.value.trim()){done++;if(ST.checked[cid])correct++}}
  updProg(parseInt(key.split('_').pop()),done,total);
  const sd=document.getElementById('fill-score-'+key);
  sd.style.display='block';
  sd.innerHTML=`Score: ${scoreBadge(correct,total)} | Completed: ${done}/${total}`;
}
function saveTr(cid){
  const val=document.getElementById('tr-'+cid).value.trim();
  ST.inputs[cid]=val;
  alert(val?'✓ Response saved!':'Nothing to save yet.');
}
function revealTr(cid,answer,keyChange,principle){
  const div=document.getElementById('tra-'+cid);
  div.className='tr-answer show';
  div.innerHTML=`<strong>🎯 Model Answer:</strong>${esc(answer)}<br><br><strong>🔄 Key Change:</strong> ${esc(keyChange)}<div class="tr-principle">📌 Principle: ${esc(principle)}</div>`;
}
function saveLog(cid){
  const val=document.getElementById('lt-'+cid).value.trim();
  ST.logs[cid]=val;
  const s=document.getElementById('ls-'+cid);
  s.className='log-saved show';
  setTimeout(()=>s.classList.remove('show'),2000);
}
function saveLogAll(key,total){
  for(let i=0;i<total;i++){const cid=`${key}_${i}`;const el=document.getElementById('lt-'+cid);if(el)ST.logs[cid]=el.value.trim()}
  alert('✓ All reflections saved. Use Download Report to export.');
}
function handleDownload(){
  const lv=LEVELS[AL];
  const now=new Date();
  let txt=`HUONG STELLA PARADIGM — Daily Drills Day 1\nLevel: ${lv.label} | Theme: ${lv.theme}\nDate: ${now.toISOString().slice(0,10)}\n${'='.repeat(60)}\n\n`;
  lv.sections.forEach((sec,si)=>{
    txt+=`SECTION: ${sec.title}\n${'-'.repeat(40)}\n`;
    const key=`${AL}_${si}`;
    if(sec.type==='spot'){
      sec.items.forEach((it,i)=>{
        const cid=`${key}_${i}`;
        const ans=ST.choices[cid];
        txt+=`Q${i+1}: ${it.sentence}\n  Your answer: ${ans===undefined?'(not attempted)':ans?'Correct ✓':'Incorrect ✗'}\n  Correct: ${it.correctWord}\n\n`;
      });
    } else if(sec.type==='fill'){
      sec.items.forEach((it,i)=>{
        const cid=`${key}_${i}`;
        txt+=`Q${i+1}: ${it.template}\n  Your answer: ${ST.inputs[cid]||'(blank)'}\n  Correct: ${it.answer}\n\n`;
      });
    } else if(sec.type==='transform'){
      sec.items.forEach((it,i)=>{
        const cid=`${key}_${i}`;
        txt+=`Transform ${i+1}: ${it.spoken}\n  Your version: ${ST.inputs[cid]||'(not attempted)'}\n  Model: ${it.answer}\n\n`;
      });
    } else if(sec.type==='log'){
      sec.prompts.forEach((pr,i)=>{
        const cid=`${key}_${i}`;
        txt+=`Reflection ${i+1}: ${pr}\n  ${ST.logs[cid]||'(not completed)'}\n\n`;
      });
    }
    txt+='\n';
  });
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`HuongStella_DailyDrill_Day1_`+AL+`_`+now.toISOString().slice(0,10)+`.txt`;
  a.click();
}

// ── NAV & INIT ─────────────────────────────────────────────────────────
function buildLvTabs(){
  document.getElementById('lvTabs').innerHTML=Object.keys(LEVELS).map(k=>`<div class="lv-tab${k===AL?' active':''}" onclick="switchLv('${k}')" style="${k===AL?'color:'+LEVELS[k].color+';border-bottom-color:'+LEVELS[k].color:''}">${LEVELS[k].label}</div>`).join('');
}
function switchLv(lv){
  AL=lv;AS=0;ST.choices={};ST.inputs={};ST.checked={};ST.logs={};
  applyLevel();buildLvTabs();buildSecNav();renderSec(0);
}
function applyLevel(){
  const lv=LEVELS[AL];
  document.documentElement.style.setProperty('--lc',lv.color);
  document.documentElement.style.setProperty('--ll',lv.light);
  document.getElementById('hero').innerHTML=`
    <div class="hero-row">
      <div class="hero-badge">${esc(lv.label)}</div>
      <div class="hero-info">
        <div class="hero-theme">${esc(lv.theme)}</div>
        <div class="hero-tagline">${esc(lv.tagline)}</div>
        <div class="hero-goal">${esc(lv.goal)}</div>
        <div class="hero-time">⏱ Estimated time: ${esc(lv.time)}</div>
      </div>
    </div>`;
}
function buildSecNav(){
  document.getElementById('secNav').innerHTML=LEVELS[AL].sections.map((s,i)=>`<button class="sec-btn${i===0?' active':''}" onclick="navSec(${i})">${esc(s.title)}</button>`).join('');
}
function navSec(i){
  AS=i;document.querySelectorAll('.sec-btn').forEach((b,j)=>b.classList.toggle('active',j===i));renderSec(i);
}
function init(){
  document.title='Daily Drills 1';
  buildLvTabs();applyLevel();buildSecNav();renderSec(0);
}
window.addEventListener('DOMContentLoaded',init);
</script>
