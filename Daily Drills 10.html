<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Drills 10</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--lc:#2D6A4F;--ll:#D8F3DC}
body{font-family:'Inter',sans-serif;background:#F4F2EF;color:#1a1a1a;min-height:100vh}
header{background:#111;color:#fff;padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
header .brand{font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;opacity:.55;font-weight:600}
header .day-label{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;opacity:.7;font-weight:500}
header h1{font-size:1.15rem;font-weight:700;letter-spacing:-.01em;margin-top:2px}
.dl-btn{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 16px;border-radius:6px;font-size:.78rem;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.dl-btn:hover{background:rgba(255,255,255,.1)}
.lv-tabs{display:flex;gap:6px;padding:16px 24px 0;flex-wrap:wrap}
.lv-tab{padding:8px 18px;border-radius:8px 8px 0 0;font-size:.8rem;font-weight:600;cursor:pointer;border:2px solid transparent;background:#e8e4de;color:#555;transition:all .2s;letter-spacing:.02em}
.lv-tab.active{background:var(--lc);color:#fff;border-color:var(--lc)}
.lv-tab:hover:not(.active){background:#ddd8d0}
.lv-header{background:var(--lc);color:#fff;padding:20px 28px 16px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.lv-header h2{font-size:1.1rem;font-weight:700}
.lv-header .tagline{font-size:.82rem;opacity:.85;margin-top:3px}
.lv-header .meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.lv-header .meta span{font-size:.75rem;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:20px}
.goal-bar{background:var(--ll);border-left:4px solid var(--lc);padding:12px 20px;font-size:.83rem;line-height:1.6;color:#1a1a1a}
.goal-bar strong{color:var(--lc)}
.sec-nav{display:flex;gap:6px;padding:16px 24px 0;flex-wrap:wrap;background:#F4F2EF}
.sec-btn{padding:7px 14px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer;border:2px solid #ccc;background:#fff;color:#555;transition:all .2s}
.sec-btn.active{background:var(--lc);color:#fff;border-color:var(--lc)}
.sec-btn:hover:not(.active){border-color:var(--lc);color:var(--lc)}
.sec-content{padding:24px;max-width:860px}
/* Theory cards */
.theory-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:4px}
.tc{background:#fff;border-radius:10px;padding:16px;border-top:4px solid var(--lc);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.tc .tc-label{font-weight:700;font-size:.9rem;margin-bottom:4px}
.tc .tc-badge{display:inline-block;font-size:.68rem;background:var(--ll);color:var(--lc);padding:2px 8px;border-radius:20px;font-weight:700;margin-bottom:8px;letter-spacing:.04em}
.tc .tc-ex{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:#f7f5f2;padding:8px 10px;border-radius:6px;margin-bottom:8px;line-height:1.5}
.tc .tc-rule{font-size:.78rem;color:#444;line-height:1.55}
/* Theory2 */
.t2-grid{display:grid;gap:14px;margin-top:4px}
.t2c{background:#fff;border-radius:10px;padding:16px;border-left:5px solid var(--lc);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.t2c .t2-label{font-weight:700;font-size:.9rem;margin-bottom:8px}
.t2c .t2-verbs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.t2c .t2-verb{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:var(--ll);color:var(--lc);padding:3px 10px;border-radius:4px;font-weight:600}
.t2c .t2-mem{font-size:.78rem;color:#555;margin-bottom:6px;font-style:italic}
.t2c .t2-ex{font-family:'JetBrains Mono',monospace;font-size:.78rem;background:#f7f5f2;padding:8px 10px;border-radius:6px;line-height:1.5}
/* Theory3 */
.t3-pairs{display:grid;gap:14px;margin-top:4px}
.t3p{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.t3p .sp{font-size:.8rem;color:#888;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.t3p .spoken-s{font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:8px 12px;background:#fdf3f3;border-left:3px solid #c00;border-radius:0 6px 6px 0;margin-bottom:10px}
.t3p .academic-s{font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:8px 12px;background:#f0fdf4;border-left:3px solid var(--lc);border-radius:0 6px 6px 0;margin-bottom:10px}
.t3p .change{font-size:.78rem;color:#555;font-style:italic}
.t3-insight{background:var(--ll);border-left:4px solid var(--lc);padding:12px 16px;border-radius:0 8px 8px 0;font-size:.82rem;color:#1a1a1a;margin-top:14px;line-height:1.55}
.t3-insight strong{color:var(--lc)}
/* Theory4 */
.t4-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-top:4px}
.t4c{background:#fff;border-radius:10px;padding:16px;border-top:4px solid var(--lc);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.t4c .t4-label{font-weight:700;font-size:.88rem;margin-bottom:6px}
.t4c .t4-desc{font-size:.78rem;color:#444;margin-bottom:8px;line-height:1.5}
.t4c .t4-fix{font-size:.78rem;background:#f7f5f2;padding:8px 10px;border-radius:6px;line-height:1.5;font-family:'JetBrains Mono',monospace}
/* Spot */
.spot-item{background:#fff;border-radius:10px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.spot-item .si-num{font-size:.72rem;font-weight:700;color:var(--lc);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.spot-item .si-sent{font-size:.9rem;line-height:1.65;margin-bottom:12px}
.si-sent .underline{text-decoration:underline;text-decoration-color:var(--lc);text-underline-offset:3px;cursor:pointer}
.spot-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.spot-opt{padding:7px 14px;border-radius:6px;border:2px solid #ddd;background:#fff;font-size:.82rem;cursor:pointer;transition:all .18s;font-family:'Inter',sans-serif}
.spot-opt:hover{border-color:var(--lc)}
.spot-opt.sel-wrong{background:#fdf3f3;border-color:#c00;color:#c00}
.spot-opt.sel-right{background:#f0fdf4;border-color:#2D6A4F;color:#2D6A4F}
.spot-opt.revealed-right{background:#f0fdf4;border-color:#2D6A4F;color:#2D6A4F}
.spot-reveal{display:none;margin-top:10px;background:#f7f5f2;border-radius:8px;padding:12px 14px;font-size:.8rem;line-height:1.6}
.spot-reveal.show{display:block}
.spot-reveal .rev-rule{margin-bottom:6px}
.spot-reveal .rev-tip{color:#555;font-style:italic}
.spot-reveal .rev-label{font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--lc);margin-bottom:2px}
.calc-row{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
.calc-btn{background:var(--lc);color:#fff;border:none;padding:9px 20px;border-radius:7px;font-size:.82rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:opacity .2s}
.calc-btn:hover{opacity:.85}
.score-badge{display:inline-block;padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:700}
/* Fill */
.fill-item{background:#fff;border-radius:10px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.fill-item .fi-num{font-size:.72rem;font-weight:700;color:var(--lc);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.fi-base{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.78rem;background:var(--ll);color:var(--lc);padding:3px 10px;border-radius:4px;margin-bottom:10px;font-weight:600}
.fi-template{font-size:.88rem;line-height:1.65;margin-bottom:10px}
.fi-input-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fi-input{border:2px solid #ddd;border-radius:6px;padding:7px 12px;font-size:.85rem;font-family:'JetBrains Mono',monospace;outline:none;transition:border .18s;width:180px}
.fi-input:focus{border-color:var(--lc)}
.fi-input.correct{border-color:#2D6A4F;background:#f0fdf4}
.fi-input.wrong{border-color:#c00;background:#fdf3f3}
.fi-chk{background:var(--lc);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.fi-fb{margin-top:8px;font-size:.8rem;display:none;line-height:1.55}
.fi-fb.show{display:block}
.fi-fb.ok{color:#2D6A4F}
.fi-fb.no{color:#c00}
/* Transform */
.tr-item{background:#fff;border-radius:10px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.tr-item .tr-num{font-size:.72rem;font-weight:700;color:var(--lc);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.tr-spoken{font-family:'JetBrains Mono',monospace;font-size:.82rem;padding:8px 12px;background:#fdf3f3;border-left:3px solid #c00;border-radius:0 6px 6px 0;margin-bottom:8px;line-height:1.5}
.tr-hint{font-size:.78rem;color:#555;margin-bottom:8px;font-style:italic}
.tr-hint strong{color:var(--lc);font-style:normal}
.tr-textarea{width:100%;border:2px solid #ddd;border-radius:6px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:.83rem;resize:vertical;min-height:72px;outline:none;transition:border .18s}
.tr-textarea:focus{border-color:var(--lc)}
.tr-btns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.tr-save-btn{background:var(--lc);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.tr-reveal-btn{background:#fff;color:var(--lc);border:2px solid var(--lc);padding:7px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.tr-model{display:none;margin-top:10px;background:#f0fdf4;border-left:4px solid var(--lc);padding:12px 14px;border-radius:0 8px 8px 0;font-size:.8rem;line-height:1.6}
.tr-model.show{display:block}
.tr-model .tm-ans{font-family:'JetBrains Mono',monospace;font-size:.8rem;margin-bottom:6px}
.tr-model .tm-key{color:#555;font-style:italic;font-size:.78rem}
/* Log */
.log-item{background:#fff;border-radius:10px;padding:18px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.log-item .li-num{font-size:.72rem;font-weight:700;color:var(--lc);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.log-item .li-prompt{font-size:.87rem;line-height:1.6;margin-bottom:10px}
.log-textarea{width:100%;border:2px solid #ddd;border-radius:6px;padding:10px 12px;font-family:'Inter',sans-serif;font-size:.83rem;resize:vertical;min-height:72px;outline:none;transition:border .18s}
.log-textarea:focus{border-color:var(--lc)}
.log-save-btn{background:var(--lc);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;margin-top:8px}
.log-saved{color:var(--lc);font-size:.78rem;margin-top:6px;display:none}
.log-saved.show{display:block}
.save-all-row{margin-top:10px}
/* Rubric */
.rubric-toggle{background:none;border:1px solid #ccc;border-radius:6px;padding:6px 14px;font-size:.78rem;cursor:pointer;color:#555;font-family:'Inter',sans-serif;margin-top:14px;transition:all .2s}
.rubric-toggle:hover{border-color:var(--lc);color:var(--lc)}
.rubric-box{display:none;margin-top:10px;background:#f7f5f2;border-radius:8px;padding:14px}
.rubric-box.show{display:block}
.rubric-box table{width:100%;border-collapse:collapse;font-size:.78rem}
.rubric-box th{text-align:left;color:#555;font-weight:600;padding:4px 8px;border-bottom:2px solid #ddd}
.rubric-box td{padding:5px 8px;border-bottom:1px solid #eee;line-height:1.5}
/* Progress */
.prog-bar-wrap{height:6px;background:#e0dbd4;border-radius:3px;margin-bottom:4px;overflow:hidden}
.prog-bar{height:100%;background:var(--lc);border-radius:3px;transition:width .4s}
.prog-label{font-size:.72rem;color:#777}
.prog-wrap{margin-bottom:16px}
/* Section title */
.sec-title{font-size:1rem;font-weight:700;margin-bottom:4px}
.sec-subtitle{font-size:.8rem;color:#666;margin-bottom:16px}
</style>
</head>
<body>
<header>
  <div>
    <div class="brand">Huong Stella Paradigm</div>
    <h1>Vocabulary Building</h1>
    <div class="day-label">Day 10 · Interactive Practice</div>
  </div>
  <button class="dl-btn" onclick="handleDownload()">⬇ Download Report</button>
</header>

<div class="lv-tabs" id="lvTabs"></div>
<div id="lvHeader"></div>
<div id="secNav"></div>
<div class="sec-content" id="secContent"></div>

<script>
const DAY = 10;
let AL = 'a2b1', AS = 0;
const ST = {choices:{}, inputs:{}, checked:{}, logs:{}};

const RUBRICS = {
  a2b1: {
    spot: [
      {criterion:"Identifies the incorrect word form",max:1,desc:"Selects the exact underlined error in the sentence"},
      {criterion:"Chooses the correct replacement",max:2,desc:"Selects the right word-form option (1 pt) with no second attempt (2 pts)"},
      {criterion:"Applies rule consistently",max:1,desc:"Score awarded after full section based on pattern of accuracy"}
    ],
    fill: [
      {criterion:"Correct word form supplied",max:2,desc:"Exact target form used (2 pts); plausible but wrong form (0 pts)"},
      {criterion:"Spelling accurate",max:1,desc:"No spelling errors in the answer"},
      {criterion:"Appropriate suffix selected",max:1,desc:"Chooses the suffix that matches the grammatical category required"}
    ],
    log: [
      {criterion:"Reflection is specific",max:2,desc:"Names a particular word family or suffix, not a general comment"},
      {criterion:"Own example sentence is grammatically correct",max:2,desc:"Word form and sentence structure are both accurate"},
      {criterion:"Rule explanation shows understanding",max:2,desc:"Explains why the suffix signals a particular word class, not just lists examples"}
    ]
  },
  b1b2: {
    spot: [
      {criterion:"Identifies the error",max:1,desc:"Correct option selected on first try"},
      {criterion:"Understands the grammatical reason",max:2,desc:"After reveal: can explain particle placement or following-verb form rule"},
      {criterion:"Error type correctly categorised",max:1,desc:"Labels error as particle order / verb form / preposition etc."}
    ],
    fill: [
      {criterion:"Correct phrasal verb form",max:2,desc:"Right phrasal verb with correct particle and verb form"},
      {criterion:"Particle accuracy",max:1,desc:"Particle choice is exact (off/up/forward etc.)"},
      {criterion:"Tense consistent with context",max:1,desc:"Verb tense matches the rest of the sentence"}
    ],
    log: [
      {criterion:"Error record is precise",max:2,desc:"States the wrong form and the correct form with explanation"},
      {criterion:"Grammar rule explained correctly",max:2,desc:"Separable vs inseparable rule stated accurately"},
      {criterion:"Original sentences are natural",max:2,desc:"Both sentences sound idiomatic, not just grammatically correct"}
    ]
  },
  b2c1: {
    spot: [
      {criterion:"Error identified correctly",max:1,desc:"Selects the right option on first attempt"},
      {criterion:"Rule applied to AWL context",max:2,desc:"Error traced to specific AWL word class, collocation, or SVA rule"},
      {criterion:"Register awareness demonstrated",max:1,desc:"Recognises when a word is too informal or incorrectly formed for academic prose"}
    ],
    fill: [
      {criterion:"Correct AWL word selected",max:2,desc:"Exact lemma in correct form (e.g. assess not assessment where verb needed)"},
      {criterion:"Collocational fit",max:1,desc:"Word fits the surrounding collocation naturally"},
      {criterion:"Tense/agreement accurate",max:1,desc:"Verb form matches subject and tense frame"}
    ],
    transform: [
      {criterion:"AWL vocabulary deployed",max:2,desc:"At least two Tier-1 AWL words are used accurately and appropriately"},
      {criterion:"Nominalisation or hedging applied",max:2,desc:"Informal verb phrase replaced with noun phrase or hedged academic equivalent"},
      {criterion:"Register is consistently formal",max:1,desc:"No informal words or contractions in the transformed sentence"}
    ],
    log: [
      {criterion:"Misused word identified precisely",max:2,desc:"Names the specific AWL word and explains the error pattern"},
      {criterion:"Affect/effect distinction explained",max:2,desc:"Both words defined with correct grammatical category and example"},
      {criterion:"Own writing revision is meaningful",max:2,desc:"Substitution genuinely raises register, not just swaps a synonym"}
    ]
  },
  c1c2: {
    spot: [
      {criterion:"Error identified",max:1,desc:"Correct option on first attempt"},
      {criterion:"Connotative/gradability principle stated",max:2,desc:"Explains non-gradability, implication vs inference, or register mismatch"},
      {criterion:"Alternative phrasing suggested",max:1,desc:"Offers a precise alternative that avoids the error pattern"}
    ],
    fill: [
      {criterion:"Most precise word selected",max:2,desc:"Chooses the option with the exact connotative fit, not just a synonym"},
      {criterion:"Connotative reasoning is accurate",max:1,desc:"Can explain why the other options fail (wrong register, false implication, etc.)"},
      {criterion:"Sentence cohesion maintained",max:1,desc:"Word chosen integrates with surrounding syntax and discourse"}
    ],
    transform: [
      {criterion:"Lexical choices are evaluatively precise",max:2,desc:"Words carry the intended stance (critical, neutral, or supportive) without ambiguity"},
      {criterion:"Connotative loading is exploited deliberately",max:2,desc:"At least one word choice is justified by its connotative, not just denotative, value"},
      {criterion:"C2 syntactic complexity",max:1,desc:"Sentence uses embedding, nominalisation, or rhetorical structure beyond simple SVO"}
    ],
    log: [
      {criterion:"Connotative analysis is insightful",max:2,desc:"Goes beyond dictionary definition to explore evaluative or ideological loading"},
      {criterion:"Reporting verb distinctions are accurate",max:2,desc:"Claim/argue/assert distinguished by evidential strength and authorial stance"},
      {criterion:"Critical-stance sentence is rhetorically effective",max:2,desc:"Lexical choice alone (without explicit evaluation) signals a critical position"}
    ]
  }
};

const LEVELS = {
  a2b1: {
    label:"A2–B1", color:"#2D6A4F", light:"#D8F3DC",
    theme:"Word Families & Suffixes",
    tagline:"Build vocabulary by mastering how one root word becomes noun, verb, adjective, and adverb.",
    goal:"Today you will: identify common noun, verb, adjective, and adverb suffixes · spot word-form errors typical of Vietnamese learners · fill in the correct word form from a given root",
    time:"10–15 min",
    sections:[
      {type:"theory", title:"Warmup", subtitle:"Four suffix families you must know",
       cards:[
        {label:"Noun Suffixes", badge:"noun", color:"#2D6A4F",
         examples:"-tion/-sion: education, decision\n-ment: government, development\n-ness: happiness, darkness\n-er/-or: teacher, actor",
         rule:"Add these endings to verbs or adjectives to create nouns. 'Educate' (v) → 'education' (n). 'Happy' (adj) → 'happiness' (n). Ask: Is this person, place, thing, or idea? → needs a noun."},
        {label:"Verb Suffixes", badge:"verb", color:"#1A4A7A",
         examples:"-ise/-ize: organise, realise\n-en: strengthen, widen\n-ify: clarify, simplify\n-ate: educate, communicate",
         rule:"These endings make verbs from nouns or adjectives. 'Strong' (adj) → 'strengthen' (v). 'Simple' (adj) → 'simplify' (v). Ask: Is this an action? → needs a verb."},
        {label:"Adjective Suffixes", badge:"adjective", color:"#5A1A8A",
         examples:"-ful: careful, useful\n-less: careless, useless\n-ous: dangerous, famous\n-al: natural, cultural\n-ive: creative, effective",
         rule:"Adjective suffixes turn nouns into descriptors. 'Care' (n) → 'careful' (adj). 'Create' (v) → 'creative' (adj). Ask: Does this describe a noun? → needs an adjective."},
        {label:"Adverb Suffix", badge:"adverb", color:"#8B1A1A",
         examples:"-ly: carefully, quickly\nseriously, naturally\neffectively, culturally",
         rule:"Almost all English adverbs end in -ly. They modify verbs, adjectives, or other adverbs — NEVER nouns. 'She spoke careful.' ✗ → 'She spoke carefully.' ✓ Ask: Does this modify a verb or adjective? → needs -ly."}
       ]
      },
      {type:"spot", title:"Spot the Error", subtitle:"Each sentence has a word-form error. Choose the correct replacement.", rubricKey:"spot",
       items:[
        {sentence:"The manager spoke very careful during the presentation.",
         underlined:"careful",
         wrongWord:"careful",
         correctWord:"carefully",
         wrongType:"adjective used as adverb",
         correctType:"adverb (-ly)",
         rule:"'Careful' is an adjective and must describe a noun. Here it modifies the verb 'spoke', so the adverb form 'carefully' is required.",
         tip:"Test: replace the word with 'slowly'. If 'slowly' fits, you need -ly. 'She spoke slowly' ✓ → 'She spoke carefully' ✓."},
        {sentence:"The develop of technology has changed our daily lives.",
         underlined:"develop",
         wrongWord:"develop",
         correctWord:"development",
         wrongType:"verb used as noun",
         correctType:"noun (-ment)",
         rule:"'Develop' is a verb. After 'The', you need a noun. 'Development' (noun, -ment suffix) is the correct form: 'The development of technology'.",
         tip:"Spot a noun slot: after 'the', before 'of', or after a preposition, the word must be a noun. Add -ment, -tion, or -ness."},
        {sentence:"He is very success in his business and inspires many people.",
         underlined:"success",
         wrongWord:"success",
         correctWord:"successful",
         wrongType:"noun used as adjective",
         correctType:"adjective (-ful)",
         rule:"After 'is very', you need an adjective, not a noun. 'Success' is a noun. 'Successful' (adjective, -ful suffix) is required: 'He is very successful'.",
         tip:"After 'be + very/quite/really', you almost always need an adjective. Nouns cannot follow intensifiers like 'very'."},
        {sentence:"We need to simple the instructions so that beginners can understand them.",
         underlined:"simple",
         wrongWord:"simple",
         correctWord:"simplify",
         wrongType:"adjective used as verb",
         correctType:"verb (-ify)",
         rule:"After 'to' (infinitive marker) you need a base verb. 'Simple' is an adjective. 'Simplify' (verb, -ify suffix) converts it to the correct form: 'to simplify'.",
         tip:"After 'to need to / want to / have to + ___', you need a verb. If the word ends in -ple, -ful, -ous, it's likely an adjective — add -ify or -ise."},
        {sentence:"The child is very create and produces beautiful drawings every week.",
         underlined:"create",
         wrongWord:"create",
         correctWord:"creative",
         wrongType:"verb used as adjective",

  c1c2: {
    label:"C1+–C2", color:"#8B1A1A", light:"#F5DADA",
    theme:"Lexical Precision & Connotation",
    tagline:"Exploit connotative loading, gradability constraints, and evaluative register to write with rhetorical precision.",
    goal:"Today you will: distinguish words with identical denotation but divergent connotative loading · identify errors arising from gradability violations and inference/implication confusion · construct sentences where lexical choice alone signals evaluative stance",
    time:"20–25 min",
    sections:[
      {type:"theory4", title:"Warmup", subtitle:"Four principles of lexical precision at C2 level",
       cards:[
        {label:"Denotation vs. Connotation", color:"#8B1A1A",
         desc:"Two words can share a dictionary definition yet carry opposite evaluative loading. 'Slender', 'slim', and 'skinny' all mean 'not fat', but 'slender' is admiring, 'slim' is neutral, and 'skinny' can be pejorative. In academic writing, 'claim' implies the speaker is sceptical of the assertion; 'argue' is neutral; 'demonstrate' implies the writer accepts the evidence.",
         fix:"Before choosing a word, ask: What attitude does this word signal? In critical writing, 'the regime', 'the administration', and 'the government' are not interchangeable — 'regime' connotes illegitimacy."},
        {label:"Gradability & Absolute Adjectives", color:"#5A1A8A",
         desc:"Gradable adjectives (important, useful, long) accept degree modifiers: 'very important', 'rather useful'. Non-gradable (absolute) adjectives (unique, perfect, essential, fatal, infinite) describe states that cannot logically exist in degrees. Saying 'very unique' is a logical contradiction — something is either the only one of its kind or it is not.",
         fix:"Test: ask 'How X?' or 'More X than what?'. If the question makes no sense, the adjective is non-gradable. Don't write 'very unique' — write 'particularly distinctive', 'entirely without precedent', or 'genuinely one of a kind'."},
        {label:"Imply vs. Infer (and their nominals)", color:"#2D6A4F",
         desc:"The SENDER of a message IMPLIES (suggests without stating). The RECEIVER INFERS (draws a conclusion). This distinction extends to their nominals (implication / inference) and to parallel pairs: data, findings, and results IMPLY — they cannot 'infer'. Only conscious agents (researchers, readers, the author) can infer. Confusing them misattributes agency.",
         fix:"Rewrite test: 'The data infers…' → WRONG (data cannot reason). → 'The data imply…' ✓. 'The data carry the implication that…' ✓. Reserve 'infer' for agents: 'From this, one may infer that…'"},
        {label:"Deny vs. Dispute vs. Reject", color:"#1A4A7A",
         desc:"These near-synonyms are not interchangeable in academic argumentation. 'Deny' = assert that something did not happen or is not true (factual claim). 'Dispute' = contest the validity, accuracy, or interpretation of something. 'Reject' = refuse to accept a claim or theory, often on evidential or logical grounds. Using 'deny' when you mean 'dispute' implies the opponent is lying rather than mistaken.",
         fix:"'Scholars deny the theory' → implies the theory is obviously false. 'Scholars dispute the theory' → implies legitimate methodological or evidential disagreement. Precision here is an ethical as well as a stylistic choice."}
       ]
      },
      {type:"spot", title:"Spot the Error", subtitle:"Each sentence has a connotative, gradability, or semantic precision error. Identify and correct it.", rubricKey:"spot",
       items:[
        {sentence:"The author argues that urban poverty is a very unique phenomenon that defies cross-cultural comparison.",
         underlined:"very unique",
         wrongWord:"very unique",
         correctWord:"genuinely distinctive",
         wrongType:"gradability violation: absolute adjective",
         correctType:"gradable adjective phrase",
         rule:"'Unique' is an absolute adjective meaning 'the only one of its kind'. It cannot be graded with 'very', 'quite', 'rather', or 'fairly'. Use gradable alternatives: 'particularly distinctive', 'genuinely singular', or 'without parallel'.",
         tip:"The non-gradable test: ask 'How unique is it?' If the question sounds absurd (there can't be degrees of being the only one), the adjective is absolute. Other absolutes: perfect, fatal, infinite, impossible, essential, complete."},
        {sentence:"This data infers that economic growth alone is insufficient to reduce structural inequality.",
         underlined:"infers",
         wrongWord:"infers",
         correctWord:"implies",
         wrongType:"agency confusion: data cannot infer",
         correctType:"implies (data is the sender, not receiver)",
         rule:"Only conscious agents can INFER (draw conclusions). Data, findings, results, and evidence can only IMPLY (suggest without stating). 'The data imply that…' ✓. The researcher or reader infers: 'From this, researchers may infer that…' ✓.",
         tip:"Sender → implies. Receiver → infers. Ask: Is this word pointing outward (suggesting to someone else) or inward (concluding from something)? Data points outward → implies."},
        {sentence:"Several prominent academics have denied the methodology, citing insufficient sample sizes.",
         underlined:"denied",
         wrongWord:"denied",
         correctWord:"disputed",
         wrongType:"wrong near-synonym: deny ≠ dispute",
         correctType:"disputed (contested validity, not existence)",
         rule:"'Deny' = state that something did not happen / is not true (factual negation). 'Dispute' = contest the validity or accuracy of something. Academics 'dispute' a methodology — they question whether it is sound, not whether it exists. 'Deny' implies the methodology is non-existent or fabricated.",
         tip:"Ask: Are they saying 'it didn't happen'? → deny. Or 'it happened but it's wrong / flawed'? → dispute / challenge / contest."},
        {sentence:"The findings are interested in their implications for social policy reform.",
         underlined:"interested",
         wrongWord:"interested",
         correctWord:"interesting",
         wrongType:"participant adjective: -ed vs. -ing confusion",
         correctType:"-ing adjective (quality of the thing)",
         rule:"'-ed' adjectives describe how a conscious being FEELS (the reader is interested). '-ing' adjectives describe the quality of a THING (the findings are interesting). Findings cannot feel interest — they have the property of being interesting.",
         tip:"Test with person/thing: 'I am interested because the findings are ___.' The blank takes -ing. Reverse: 'The findings made me feel ___.' The blank takes -ed. Findings = -ing; Readers = -ed."},
        {sentence:"The policy was criticised for being too much ambitious in its targets and timeframe.",

         wrongWord:"too much ambitious",
         correctWord:"overly ambitious",
         wrongType:"wrong degree modifier before adjective",
         correctType:"overly / excessively + adjective",

         tip:"Overly = too + adj (formal). Too = too + adj (neutral). Too much = too + uncountable noun. Never: too much + adjective. Quick test: 'too much + [noun]' ✓ / 'too + [adjective]' ✓ / 'too much + [adjective]' ✗."}
       ]
      },
      {type:"transform", title:"Transform", subtitle:"Rewrite each sentence to achieve the level of lexical precision and connotative control expected at C2.", rubricKey:"transform",
       items:[
        {spoken:"People always say economic growth is good, but some experts think it can cause problems for society.",
         hint:"Use: conventionally valorised / a growing body of scholarship / assumption / GDP expansion / correlates",
         answer:"Whilst economic growth is conventionally valorised as an unqualified societal good, a growing body of scholarship challenges the assumption that GDP expansion necessarily correlates with improved social outcomes. / Economic growth, long positioned within policy discourse as an intrinsically beneficial objective, is increasingly subject to scholarly scrutiny regarding its distributional and social effects.",
         keyChange:"'People always say is good' → 'conventionally valorised as': the adverb 'conventionally' signals that this is a received assumption, not an established fact — a subtle critical move. 'Some experts think can cause problems' → 'challenges the assumption that… correlates with': academic hedging + AWL collocation.",
         principle:"Connotative precision as critique: 'valorised' (rather than 'described as good') signals that the positive framing is ideologically constructed. Choosing words that expose assumptions is a key C2 rhetorical strategy."},
        {spoken:"The word 'investment' sounds positive, so politicians use it instead of 'spending' to make people think it's a good thing.",
         hint:"Use: lexical choice / constitutes / rhetorical strategy / connotative loading / reframe / expenditure",
         answer:"The lexical choice of 'investment' over 'spending' constitutes a deliberate rhetorical strategy, exploiting the former term's positive connotative loading to reframe public expenditure as productive rather than merely costly. / Substituting 'investment' for 'spending' is a calculated rhetorical manoeuvre: the term's accumulated connotations of future return and rational planning work to legitimise what might otherwise be perceived as fiscal profligacy.",
         keyChange:"'Sounds positive' → 'positive connotative loading': names the linguistic phenomenon precisely. 'Make people think it's a good thing' → 'reframe public expenditure as productive': the verb 'reframe' signals deliberate rhetorical construction.",
         principle:"At C2, the language you use to describe language should itself be precise. 'Reframe', 'construct', 'position', and 'constitute' are verbs that signal discourse awareness — they show you understand that word choice is never neutral."},
        {spoken:"We can tell the author is biased because they only use words that support their view.",
         hint:"Use: lexical choices / consistently foregrounding / marginalising / evaluative stance / claim to objectivity / undermine",
         answer:"The author's lexical choices — consistently foregrounding favourable framings whilst marginalising countervailing evidence — reveal an underlying evaluative stance that fundamentally undermines the text's claim to objectivity. / A pattern of lexical selection biased toward confirmatory framing, combined with the systematic elision of contradictory evidence, exposes the evaluative commitments beneath the text's ostensibly neutral register.",
         keyChange:"'We can tell' → eliminated (first person replaced by impersonal evidence-based claim). 'Only use words that support their view' → 'consistently foregrounding favourable framings whilst marginalising countervailing evidence': precise description of the rhetorical mechanism.",
         principle:"C2 critical analysis avoids evaluative assertions ('the author is biased') and instead describes observable linguistic mechanisms ('foregrounding', 'marginalising', 'eliding') that lead the reader to draw the critical conclusion independently."}
       ]
      },
      {type:"log", title:"Error Log", subtitle:"Reflect on today's learning. Write in the spaces below.", rubricKey:"log",
       prompts:[
         "Find a word in something you read recently — an article, an essay, or academic text — whose connotative loading surprised or struck you. Quote the sentence, name the word, and analyse what the word implies beyond its literal dictionary definition.",
         "Distinguish 'claim', 'argue', and 'assert' as academic reporting verbs. For each: (a) state the evidential status it implies, (b) state what stance the reporting author takes, and (c) give an example sentence. When would you choose 'claim' over 'argue' and why does that choice matter rhetorically?",
         "Write a sentence about a policy, idea, or phenomenon in your field in which your lexical choice alone — without any explicit evaluative adjective like 'good' or 'problematic' — signals a clearly critical stance toward the subject. Then write a second version with a neutral or supportive stance, using different lexical choices. Annotate the key words in both."
       ]
      }
    ]
  }
};

/* ── Init ── */
function init(){
  document.title = 'Daily Drills 10';
  buildLvTabs();
  switchLv('a2b1');
}

function buildLvTabs(){
  const c = document.getElementById('lvTabs');
  c.innerHTML = '';
  Object.keys(LEVELS).forEach(k=>{
    const lv = LEVELS[k];
    const btn = document.createElement('button');
    btn.className = 'lv-tab' + (k===AL?' active':'');
    btn.textContent = lv.label;
    btn.style.setProperty('--lc', lv.color);
    btn.onclick = ()=>switchLv(k);
    c.appendChild(btn);
  });
}

function switchLv(k){
  AL = k; AS = 0;
  document.querySelectorAll('.lv-tab').forEach((b,i)=>{
    b.classList.toggle('active', Object.keys(LEVELS)[i]===k);
  });
  applyLevel();
  buildSecNav();
  navSec(0);
}

function applyLevel(){
  const lv = LEVELS[AL];
  document.documentElement.style.setProperty('--lc', lv.color);
  document.documentElement.style.setProperty('--ll', lv.light);
  const h = document.getElementById('lvHeader');
  h.style.setProperty('--lc', lv.color);
  h.style.setProperty('--ll', lv.light);
  h.innerHTML = `
    <div class="lv-header" style="--lc:${lv.color}">
      <div>
        <h2>${lv.label} — ${lv.theme}</h2>
        <div class="tagline">${lv.tagline}</div>
        <div class="meta"><span>⏱ ${lv.time}</span><span>Day 10</span></div>
      </div>
    </div>
    <div class="goal-bar" style="--lc:${lv.color};--ll:${lv.light}"><strong>Today you will:</strong> ${lv.goal}</div>`;
}

function buildSecNav(){
  const lv = LEVELS[AL];
  const c = document.getElementById('secNav');
  c.innerHTML = '';
  lv.sections.forEach((s,i)=>{
    const b = document.createElement('button');
    b.className = 'sec-btn' + (i===0?' active':'');
    b.textContent = s.title;
    b.onclick = ()=>navSec(i);
    c.appendChild(b);
  });
}

function navSec(i){
  AS = i;
  document.querySelectorAll('.sec-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  renderSec(i);
}

function renderSec(i){
  const lv = LEVELS[AL];
  const sec = lv.sections[i];
  const c = document.getElementById('secContent');
  c.style.setProperty('--lc', lv.color);
  c.style.setProperty('--ll', lv.light);
  let html = `<div class="sec-title">${sec.title}</div><div class="sec-subtitle">${sec.subtitle}</div>`;
  if(sec.type==='theory') html += rTheory(sec);
  else if(sec.type==='theory2') html += rTheory2(sec);
  else if(sec.type==='theory3') html += rTheory3(sec);
  else if(sec.type==='theory4') html += rTheory4(sec);
  else if(sec.type==='spot') html += rSpot(sec);
  else if(sec.type==='fill') html += rFill(sec);
  else if(sec.type==='transform') html += rTransform(sec);
  else if(sec.type==='log') html += rLog(sec);
  c.innerHTML = html;
}

/* ── Renderers ── */
function rTheory(sec){
  return `<div class="theory-grid">${sec.cards.map(c=>`
    <div class="tc" style="border-top-color:${c.color}">
      <div class="tc-label">${esc(c.label)}</div>
      <span class="tc-badge" style="background:${LEVELS[AL].light};color:${c.color}">${esc(c.badge)}</span>
      <div class="tc-ex">${esc(c.examples).replace(/\n/g,'<br>')}</div>
      <div class="tc-rule">${esc(c.rule)}</div>
    </div>`).join('')}</div>`;
}

function rTheory2(sec){
  return `<div class="t2-grid">${sec.groups.map(g=>`
    <div class="t2c" style="border-left-color:${g.color}">
      <div class="t2-label">${esc(g.label)}</div>
      <div class="t2-verbs">${g.verbs.map(v=>`<span class="t2-verb" style="background:${LEVELS[AL].light};color:${g.color}">${esc(v)}</span>`).join('')}</div>
      <div class="t2-mem">${esc(g.memory)}</div>
      <div class="t2-ex">${esc(g.example)}</div>
    </div>`).join('')}</div>`;
}

function rTheory3(sec){
  const pairs = sec.pairs.map((p,i)=>`
    <div class="t3p">
      <div class="sp">Informal</div>
      <div class="spoken-s">${esc(p.spoken)}</div>
      <div class="sp">Academic</div>
      <div class="academic-s">${esc(p.academic)}</div>
      <div class="change">↳ ${esc(p.change)}</div>
    </div>`).join('');
  return `<div class="t3-pairs">${pairs}</div>
    <div class="t3-insight"><strong>Key principle:</strong> ${esc(sec.insight)}</div>`;
}

function rTheory4(sec){
  return `<div class="t4-grid">${sec.cards.map(c=>`
    <div class="t4c" style="border-top-color:${c.color}">
      <div class="t4-label">${esc(c.label)}</div>
      <div class="t4-desc">${esc(c.desc)}</div>
      <div class="t4-fix">${esc(c.fix)}</div>
    </div>`).join('')}</div>`;
}

function rSpot(sec){
  const rub = RUBRICS[AL][sec.rubricKey];
  let html = progHTML(sec.rubricKey);
  sec.items.forEach((it,i)=>{
    const sid = AL+'_spot_'+i;
    const parts = it.sentence.split(it.underlined);
    const sentHtml = parts.length===2
      ? esc(parts[0])+'<span class="underline">'+esc(it.underlined)+'</span>'+esc(parts[1])
      : esc(it.sentence);
    html += `<div class="spot-item">
      <div class="si-num">Item ${i+1}</div>
      <div class="si-sent">${sentHtml}</div>
      <div class="spot-opts" id="opts_${sid}">
        <button class="spot-opt" onclick="spotPick('${sid}',0,'${esc(it.wrongWord)}','${esc(it.correctWord)}','${esc(it.wrongType)}','${esc(it.correctType)}')">${esc(it.wrongWord)} (keep)</button>
        <button class="spot-opt" onclick="spotPick('${sid}',1,'${esc(it.wrongWord)}','${esc(it.correctWord)}','${esc(it.wrongType)}','${esc(it.correctType)}')">${esc(it.correctWord)} (change)</button>
      </div>
      <div class="spot-reveal" id="rev_${sid}">
        <div class="rev-label">Error type</div>
        <div class="rev-rule">✗ <strong>${esc(it.wrongWord)}</strong> — ${esc(it.wrongType)}<br>✓ <strong>${esc(it.correctWord)}</strong> — ${esc(it.correctType)}</div>
        <div class="rev-rule" style="margin-top:6px">${esc(it.rule)}</div>
        <div class="rev-tip" style="margin-top:6px">💡 ${esc(it.tip)}</div>
      </div>
    </div>`;
  });
  html += `<div class="calc-row">
    <button class="calc-btn" onclick="calcSpot('${sec.rubricKey}',${sec.items.length})">Calculate Score</button>
    <span id="score_${AL}_${sec.rubricKey}"></span>
  </div>`;
  html += rubricHTML(rub, AL+'_'+sec.rubricKey);
  return html;
}

function rFill(sec){
  const rub = RUBRICS[AL][sec.rubricKey];
  let html = progHTML(sec.rubricKey);
  sec.items.forEach((it,i)=>{
    const fid = AL+'_fill_'+i;
    html += `<div class="fill-item">
      <div class="fi-num">Item ${i+1}</div>
      <span class="fi-base">${esc(it.baseWord)}</span>
      <div class="fi-template">${esc(it.template)}</div>
      <div class="fi-input-row">
        <input class="fi-input" id="inp_${fid}" placeholder="${esc(it.hint)}" type="text">
        <button class="fi-chk" onclick="fillChk('${fid}','${esc(it.answer)}','${esc(it.explanation)}')">Check</button>
      </div>
      <div class="fi-fb" id="fb_${fid}"></div>
    </div>`;
  });
  html += `<div class="calc-row">
    <button class="calc-btn" onclick="calcFill('${sec.rubricKey}',${sec.items.length})">Calculate Score</button>
    <span id="score_${AL}_${sec.rubricKey}"></span>
  </div>`;
  html += rubricHTML(rub, AL+'_'+sec.rubricKey);
  return html;
}

function rTransform(sec){
  const rub = RUBRICS[AL][sec.rubricKey];
  let html = '';
  sec.items.forEach((it,i)=>{
    const tid = AL+'_tr_'+i;
    html += `<div class="tr-item">
      <div class="tr-num">Item ${i+1}</div>
      <div class="tr-spoken">${esc(it.spoken)}</div>
      <div class="tr-hint"><strong>Hint:</strong> ${esc(it.hint)}</div>
      <textarea class="tr-textarea" id="tr_${tid}" placeholder="Write your academic version here…"></textarea>
      <div class="tr-btns">
        <button class="tr-save-btn" onclick="saveTr('${tid}')">Save</button>
        <button class="tr-reveal-btn" onclick="revealTr('${tid}','${esc(it.answer)}','${esc(it.keyChange)}','${esc(it.principle)}')">Show Model</button>
      </div>
      <div class="tr-model" id="model_${tid}">
        <div class="rev-label">Model answer</div>
        <div class="tm-ans" id="ans_${tid}"></div>
        <div class="tm-key" id="key_${tid}"></div>
        <div class="tm-key" id="pr_${tid}"></div>
      </div>
    </div>`;
  });
  html += rubricHTML(rub, AL+'_'+sec.rubricKey);
  return html;
}

function rLog(sec){
  const rub = RUBRICS[AL][sec.rubricKey];
  let html = '';
  sec.prompts.forEach((p,i)=>{
    const lid = AL+'_log_'+i;
    html += `<div class="log-item">
      <div class="li-num">Reflection ${i+1}</div>
      <div class="li-prompt">${esc(p)}</div>
      <textarea class="log-textarea" id="log_${lid}" placeholder="Write your response here…"></textarea>
      <button class="log-save-btn" onclick="saveLog('${lid}')">Save</button>
      <div class="log-saved" id="saved_${lid}">✓ Saved</div>
    </div>`;
  });
  html += `<div class="save-all-row"><button class="calc-btn" onclick="saveLogAll('${AL}',${sec.prompts.length})">Save All Reflections</button></div>`;
  html += rubricHTML(rub, AL+'_'+sec.rubricKey);
  return html;
}

/* ── Interactions ── */
function spotPick(sid, choice, wrongWord, correctWord, wrongType, correctType){
  if(ST.choices[sid]!==undefined) return;
  const isRight = choice===1;
  ST.choices[sid] = isRight ? 1 : 0;
  const opts = document.querySelectorAll(`#opts_${sid} .spot-opt`);
  opts.forEach((b,i)=>{
    if(i===choice) b.classList.add(isRight?'sel-right':'sel-wrong');
    if(!isRight && i===1) b.classList.add('revealed-right');
  });
  document.getElementById('rev_'+sid).classList.add('show');
  updProg(sid.split('_')[1]);
}

function calcSpot(key, total){
  let score = 0;
  for(let i=0;i<total;i++){
    const sid=AL+'_spot_'+i;
    if(ST.choices[sid]===1) score++;
  }
  const el = document.getElementById('score_'+AL+'_'+key);
  el.innerHTML = scoreBadge(score, total);
}

function fillChk(fid, answer, explanation){
  const inp = document.getElementById('inp_'+fid);
  const fb = document.getElementById('fb_'+fid);
  const val = inp.value.trim().toLowerCase();
  const ans = answer.toLowerCase();
  const correct = val===ans;
  ST.inputs[fid] = correct?1:0;
  inp.className = 'fi-input '+(correct?'correct':'wrong');
  fb.className = 'fi-fb show '+(correct?'ok':'no');
  fb.innerHTML = correct
    ? `✓ Correct! ${esc(explanation)}`
    : `✗ The answer is <strong>${esc(answer)}</strong>. ${esc(explanation)}`;
  updProg('fill');
}

function calcFill(key, total){
  let score = 0;
  for(let i=0;i<total;i++){
    const fid=AL+'_fill_'+i;
    if(ST.inputs[fid]===1) score++;
  }
  const el = document.getElementById('score_'+AL+'_'+key);
  el.innerHTML = scoreBadge(score, total);
}

function saveTr(tid){
  const ta = document.getElementById('tr_'+tid);
  ST.logs['tr_'+tid] = ta.value;
  ta.style.borderColor = LEVELS[AL].color;
}

function revealTr(tid, answer, keyChange, principle){
  document.getElementById('model_'+tid).classList.add('show');
  document.getElementById('ans_'+tid).innerHTML = esc(answer).replace(/ \/ /g,'<br>— or —<br>');
  document.getElementById('key_'+tid).innerHTML = '<strong>Key change:</strong> '+esc(keyChange);
  document.getElementById('pr_'+tid).innerHTML = '<strong>Principle:</strong> '+esc(principle);
}

function saveLog(lid){
  const ta = document.getElementById('log_'+lid);
  ST.logs[lid] = ta.value;
  const saved = document.getElementById('saved_'+lid);
  if(saved){ saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'),2000); }
}

function saveLogAll(lv, total){
  for(let i=0;i<total;i++){
    const lid=lv+'_log_'+i;
    const ta=document.getElementById('log_'+lid);
    if(ta) ST.logs[lid]=ta.value;
  }
  alert('All reflections saved!');
}

/* ── Download ── */
function handleDownload(){
  const lv = LEVELS[AL];
  const now = new Date();
  let txt = `HUONG STELLA PARADIGM — Daily Drills Day 10\n`;
  txt += `Level: ${lv.label} | Theme: ${lv.theme}\n`;
  txt += `Downloaded: ${now.toISOString()}\n`;
  txt += '═'.repeat(60)+'\n\n';

  txt += 'SPOT-THE-ERROR RESPONSES\n'+'─'.repeat(40)+'\n';
  lv.sections.filter(s=>s.type==='spot').forEach(s=>{
    s.items.forEach((it,i)=>{
      const sid=AL+'_spot_'+i;
      const ans=ST.choices[sid];
      txt += `Item ${i+1}: ${it.sentence}\n`;
      txt += `Your answer: ${ans===1?'Correct ('+it.correctWord+')':ans===0?'Wrong':'Not answered'}\n`;
      txt += `Correct: ${it.correctWord} | Rule: ${it.rule}\n\n`;
    });
  });

  txt += 'FILL-IN-THE-BLANK RESPONSES\n'+'─'.repeat(40)+'\n';
  lv.sections.filter(s=>s.type==='fill').forEach(s=>{
    s.items.forEach((it,i)=>{
      const fid=AL+'_fill_'+i;
      const inp=document.getElementById('inp_'+fid);
      txt += `Item ${i+1}: ${it.template}\n`;
      txt += `Your answer: ${inp?inp.value:'—'} | Correct: ${it.answer}\n`;
      txt += `Explanation: ${it.explanation}\n\n`;
    });
  });

  txt += 'TRANSFORM RESPONSES\n'+'─'.repeat(40)+'\n';
  lv.sections.filter(s=>s.type==='transform').forEach(s=>{
    s.items.forEach((it,i)=>{
      const tid=AL+'_tr_'+i;
      txt += `Item ${i+1} — Original: ${it.spoken}\n`;
      txt += `Your version: ${ST.logs['tr_'+tid]||'—'}\n`;
      txt += `Model: ${it.answer}\n\n`;
    });
  });

  txt += 'REFLECTIONS\n'+'─'.repeat(40)+'\n';
  lv.sections.filter(s=>s.type==='log').forEach(s=>{
    s.prompts.forEach((p,i)=>{
      const lid=AL+'_log_'+i;
      txt += `Reflection ${i+1}: ${p}\n`;
      txt += `${ST.logs[lid]||'—'}\n\n`;
    });
  });

  const blob = new Blob([txt],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `HuongStella_DailyDrill_Day10_`+AL+'_'+now.toISOString().slice(0,10)+'.txt';
  a.click();
}

/* ── Helpers ── */
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function badge(text){
  return `<span class="tc-badge">${esc(text)}</span>`;
}

function rubricHTML(rub, key){
  if(!rub) return '';
  return `<button class="rubric-toggle" onclick="togRub('rub_${key}')">▸ Show Rubric</button>
  <div class="rubric-box" id="rub_${key}">
    <table>
      <tr><th>Criterion</th><th>Max</th><th>Description</th></tr>
      ${rub.map(r=>`<tr><td>${esc(r.criterion)}</td><td>${r.max}</td><td>${esc(r.desc)}</td></tr>`).join('')}
    </table>
  </div>`;
}

function togRub(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle('show');
}

function progHTML(key){
  return `<div class="prog-wrap">
    <div class="prog-bar-wrap"><div class="prog-bar" id="prog_${AL}_${key}" style="width:0%"></div></div>
    <div class="prog-label" id="progl_${AL}_${key}">0% complete</div>
  </div>`;
}

function updProg(key){
  const lv = LEVELS[AL];
  const sec = lv.sections.find(s=>s.rubricKey===key);
  if(!sec) return;
  let done=0, total=0;
  if(sec.type==='spot'){
    total=sec.items.length;
    sec.items.forEach((_,i)=>{ if(ST.choices[AL+'_spot_'+i]!==undefined) done++; });
  } else if(sec.type==='fill'){
    total=sec.items.length;
    sec.items.forEach((_,i)=>{ if(ST.inputs[AL+'_fill_'+i]!==undefined) done++; });
  }
  if(total===0) return;
  const pct=Math.round(done/total*100);
  const bar=document.getElementById('prog_'+AL+'_'+key);
  const lbl=document.getElementById('progl_'+AL+'_'+key);
  if(bar) bar.style.width=pct+'%';
  if(lbl) lbl.textContent=pct+'% complete';
}

function scoreBadge(score, total){
  const pct = score/total;
  const col = pct>=0.8?'#2D6A4F':pct>=0.6?'#1A4A7A':'#8B1A1A';
  const bg = pct>=0.8?'#D8F3DC':pct>=0.6?'#D6E8F7':'#F5DADA';
  return `<span class="score-badge" style="background:${bg};color:${col}">${score}/${total} (${Math.round(pct*100)}%)</span>`;
}

window.onload = init;
</script>
